    callback_inbound_shipment_event:
      type: object
      properties:
        callback_url:
          type: string
          description: The url registered by the client for this type of callback event.
        message_type:
          type: string
          description: The type of event that triggered this callback message.
        message_id:
          type: string
          format: uuid
          description: The MasonHub unique ID for this message
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
                description: MasonHub id for this event
              customer_identifier:
                type: string
                description: The client identifier for the sku
              ststus:
                type: string
                description: The event that occurred for this inbound shipment, one of `onDock`, `receivingStarted`, or `receivingCompleted`
              as_of:
                type: string
                format: date-time
                description: The time at which the event took place
              details:
                type: object
                required:
                  - customer_identifier
                  - manifest_id
                  - purchase_order_name
                  - customer_purchase_order_id
                  - inventory_location_id
                  - expected_arrival_date
                  - shipper_name
                properties:
                  id:
                    type: string
                    format: uuid
                    readOnly: true
                    description: MasonHub's unique identifier for this record.
                  customer_identifier:
                    type: string
                    minimum: 5
                    maximum: 250
                    description: The customer's system identifier for this object. This must be unique to each record. MasonHub will pass this id back in all callbacks to customer endpoints.
                  customer_purchase_order_id:
                    type: string
                    minimum: 1
                    maximum: 250
                    description: The customer's system identifier for the related purchase order. This is non-unique and can be reused in the MasonHub system since PO's often have more than one shipment.
                  manifest_id:
                    type: string
                    minimum: 1
                    maximum: 20
                    description: |
                      The value passed in the manifest_id field should be human readable because the manifest_id is what your vendor, our associates, and your operations team will use to search for and discuss the related Inbound Shipment or Return.
                      If your customer_identifier field is the reference number you use to reference this shipment, you may also place it in the manifest_id field. Both fields are provided to allow you to store system and human readable references with this record.
                  purchase_order_name:
                    type: string
                    minimum: 1
                    maximum: 20
                    description: |
                      The purchase_order_name for this inbound shipment. Used primarily as a reference for our associates in receiving to identify or find the inbound shipment in our systems.
                      This is often the only identifier some vendors will use to identify the shipment arriving on dock, so it is essential to have the information your merchandising team and vendors used when organizing the shipment.
                      If you used the customer_purchase_order_id value as the reference value, you may also put it in the purchase_order_name field. Both fields are provided in the API to allow for system references and human friendly references.
                      If your ID's are human friendly, feel free to repeat the data.
                  inventory_location_id:
                    type: string
                    format: uuid
                    description: The MasonHub uuid for the distribution center or other channel.
                  inventory_location_address:
                    type: string
                    readOnly: true
                    description: The address for the distribution center.
                  status:
                    type: string
                    enum:
                      - open
                      - in-receiving
                      - received
                      - deleted
                    readOnly: true
                    description: The status of this inbound shipment. This is not updateable by clients directly. To remove an inbound shipment, issue a delete.
                  inbound_shipment_category:
                    type: string
                    minimum: 1
                    maximum: 20
                    description: The category of this inbound shipment. Much like the product category on the sku, this is customer driven and can be used for tracking inbound shipments in your ERP.
                  carrier_information:
                    type: object
                    required:
                      - carrier_name
                      - carrier_type
                    properties:
                      name:
                        type: string
                        minimum: 2
                        maximum: 100
                        description: Name of carrier.
                      type:
                        type: string
                        enum:
                          - LTL
                          - TL
                          - Parcel
                        description: Type of carrier carrying the inventory.
                      contact_name:
                        type: string
                        minimum: 2
                        maximum: 100
                        description: The name of the contact at the carrier.
                      street_line_one:
                        type: string
                        minimum: 5
                        maximum: 100
                        description: Street Address Line 1.
                      street_line_two:
                        type: string
                        minimum: 5
                        maximum: 100
                        description: Street Address Line 2.
                      street_line_three:
                        type: string
                        minimum: 5
                        maximum: 100
                        description: Street Address Line 3.
                      city:
                        type: string
                        minimum: 2
                        maximum: 100
                        description: Address City.
                      locale:
                        type: string
                        minimum: 2
                        maximum: 100
                        description: State/Province/Locale for this address.
                      country:
                        type: string
                        minimum: 2
                        maximum: 40
                        description: Country for this address.
                      postal_code:
                        type: string
                        minimum: 5
                        maximum: 10
                        description: Postal/Zip code for this address.
                      phone_number:
                        type: string
                        minimum: 10
                        maximum: 15
                        description: Phone number for the named individual.
                      driver_name:
                        type: string
                        minimum: 2
                        maximum: 50
                      driver_phone:
                        type: string
                        minimum: 10
                        maximum: 15
                        description: The phone number for the driver at the carrier.
                  tracking_number:
                    type: string
                    minimum: 1
                    maximum: 50
                    description: Tracking number for this shipment
                  tracking_url:
                    type: string
                    description: Optional tracking url for the inbound package. Only use if a tracking url is available from your shipping partner.
                  box_ids:
                    type: array
                    items:
                      type: string
                    description: Unique identifier for the carton or grouping of SKUs within an ASN. Required when consolidating multiple POs or when SKUs are split across multiple boxes.
                  shipper_name:
                    type: string
                    minimum: 2
                    maximum: 150
                    description: Name of shipper for this shipment.
                  shipper_city:
                    type: string
                    minimum: 2
                    maximum: 100
                    description: City of this shipper.
                  shipper_locale:
                    type: string
                    minimum: 2
                    maximum: 10
                    description: State/Locale for the shipper.
                  shipper_country:
                    type: string
                    minimum: 2
                    maximum: 2
                    description: Shipper Country.
                  expected_arrival_date:
                    type: string
                    format: date-time
                    description: Date this shipment is expected to arrive.
                  arrived_at:
                    type: string
                    format: date-time
                    readOnly: true
                    description: Date and time this shipment actually arrived on the MasonHub loading dock.
                  started_receiving_at:
                    type: string
                    format: date-time
                    readOnly: true
                    description: Date and time MaosnHub began receiving this inbound shipment.
                  finished_receiving_at:
                    type: string
                    format: date-time
                    readOnly: true
                    description: Date and time this shipment was fully received by MasonHub.
                  exceptions:
                    type: string
                    readOnly: true
                    description: Comments entered by receiving personel denoting exceptions made or found during thr receiving process.
                  special_instructions:
                    type: string
                    description: Optional instructions to perform on receipt of this inbound shipment.
                  comments:
                    type: string
                    minimum: 0
                    maximum: 250
                    description: Comments for this inbound shipment.
                  line_items:
                    type: array
                    items:
                      type: object
                      required:
                        - customer_sku_id
                        - quantity
                      properties:
                        customer_sku_id:
                          type: string
                          description: Customer's sku id.
                        sku_id:
                          type: string
                          format: uuid
                          description: MasonHub's unique identifier for the sku.
                        quantity:
                          type: integer
                          format: int32
                          description: Quantity expected in this shipment.
                        box_ids:
                          type: array
                          items:
                            type: string
                          description: Unique identifier for the carton or grouping of SKUs within an ASN. Identifies which boxes contain this SKU. Required when consolidating multiple POs or when SKUs are split across multiple boxes.
                        total_quantity_received:
                          type: integer
                          format: int32
                          readOnly: true
                          description: Total units received against this inbound shipment.
                        not_on_original_shipment:
                          type: boolean
                          readOnly: true
                          description: Marks this line item as a line item that wasn't original indicated on the inbound shipment. Usually do to a vendor error or other miscommunication.
                        receiving_details:
                          type: object
                          readOnly: true
                          description: A mapping of inventory status to details (notes and quantity) of how this InboundShipment was received.
                  version:
                    type: integer
                    readOnly: true
                    description: |
                      Every update you make to an inbound shipment creates a new version in our system. We automatically keep track of those versions
                      and always return the most recent. A deletion will soft delete all previous versions.
                  created_at:
                    type: string
                    format: date-time
                    readOnly: true
                    description: Date and Time this record was created on MasonHub's servers.
                  updated_at:
                    type: string
                    format: date-time
                    readOnly: true
                    description: Date and Time of last update on MasonHub's servers.
                  deleted_at:
                    type: string
                    format: date-time
                    readOnly: true
                    description: Date amd Time this record was deleted from MasonHub's servers.
    callback_rma_event:
      type: object
      properties:
        callback_url:
          type: string
          description: The url registered by the client for this type of callback event.
        message_type:
          type: string
          description: The type of event that triggered this callback message.
        message_id:
          type: string
          format: uuid
          description: The MasonHub unique ID for this message
        api_version:
          type: string
          description: API version to use when sending this callback to your system.
        data:
          type: array
          items:
            type: object
            required:
              - customer_identifier
              - line_items
              - return_type
            properties:
              id:
                type: string
                format: uuid
                readOnly: true
                description: MasonHub's unique identifier for this record.
              customer_identifier:
                type: string
                minimum: 5
                maximum: 250
                description: The customer's identifier for this return. This must be unique. Can be null in the case it was created from the DC.
              manifest_id:
                type: string
                minimum: 1
                maximum: 20
                description: |
                  The value passed in the manifest_id field should be human readable because the manifest_id is what your vendor, our associates, and your operations team will use to search for and discuss the related Inbound Shipment or Return.
                  If your customer_identifier field is the reference number you use to reference this shipment, you may also place it in the manifest_id field. Both fields are provided to allow you to store system and human readable references with this record.
              generate_return_label:
                type: boolean
                writeOnly: true
                default: true
                description: Indicate whether to create a return label for this return. If true, customer address must be provided and package ID can be excluded. If false, customer address can be excluded but package ID must be provided.
              package_id:
                type: string
                minimum: 5
                maximum: 100
                description: The package identifier at the warehouse. Typically a tracking ID. If `generate_return_label` is true then this gets set with the generated DHL tracking number.
              return_label_url:
                readOnly: true
                type: string
                description: Link to the generated return label for this return. Requires normal API authentication to access.
              return_type:
                type: string
                enum:
                  - returned_to_sender
                  - rma_submitted_by_customer
                  - rma_created_by_distribution_center
                description: |
                  Returns can be created by a MasonHub partner off of their OMS/ERP system or they can originate at the warehouse. For most
                  customers, there will be a mix of return types, which is really just a way for us to record how returns arrived on our docks.
                    - `returned_to_sender` - The recipient rejected the order and it was returned to the distribution center in original packaging unopened.
                    - `rma_submitted_by_customer` - The customer, in this instance, you, created the RMA in our systems and the DC knows what to expect.
                    - `rma_created_by_distribution_center` - The package arrived at our distribution center without notification from our customer.
              status:
                type: string
                enum:
                  - open
                  - in-receiving
                  - received
                  - deleted
                readOnly: true
                description: |
                  - `open` - Returns that have been created by our partners prior to receipt will be in the `open` status.
                  Once receiving has started, the status will change to `in-receiving`.
                  Once receiving has completed, the status will change to `received`, and the processed_at field will contain the processing date and time.
                  Returns that are created at the distribution center will automatically be placed into the `received` status since the return can only be created once the item
                  has been returned.
              customer_address_name:
                type: string
                minimum: 1
                maximum: 30
                description: Customer full name. Required only if generate_return_label = true.
              customer_address_street_line_one:
                type: string
                minimum: 1
                maximum: 40
                description: Street line one. Required only if generate_return_label = true.
              customer_address_street_line_two:
                type: string
                minimum: 1
                maximum: 40
                description: Street line two. Required only if generate_return_label = true.
              customer_address_city:
                type: string
                minimum: 1
                maximum: 30
                description: City. Required only if generate_return_label = true.
              customer_address_state:
                type: string
                minimum: 1
                maximum: 2
                description: 2 letter state code. Required only if generate_return_label = true.
              customer_address_postal_code:
                type: string
                minimum: 1
                maximum: 20
                description: Postal code. Required only if generate_return_label = true.
              customer_address_country_code:
                type: string
                minimum: 1
                maximum: 2
                description: 2 letter country code (Only 'US' supported at this time). Required only if generate_return_label = true.
              received_at:
                type: string
                format: date-time
                readOnly: true
                description: Date and time this return was processed at the DC.
              notes:
                type: string
                minimum: 0
                maximum: 250
                readOnly: true
                description: Notes on this return. Entered by warehouse Associate.
              customer_instructions:
                type: string
                minimum: 0
                maximum: 250
                description: Special instructions submitted by the customer.
              line_items:
                type: array
                items:
                  type: object
                  required:
                    - customer_sku_id
                    - quantity
                    - return_reason_code
                    - return_inventory_status
                  properties:
                    customer_order_id:
                      type: string
                      minimum: 2
                      maximum: 100
                      description: Customer identifier for the order this item was created against.
                    customer_sku_id:
                      type: string
                      minimum: 2
                      maximum: 100
                      description: Customer's sku_id.
                    quantity:
                      type: integer
                      format: int32
                      description: Number of units being returned.
                    quantity_received:
                      type: integer
                      format: int32
                      description: Number of units actually received.
                    return_reason_code:
                      type: string
                      enum:
                        - tooBig
                        - tooSmall
                        - damaged
                        - wrongItem
                        - other
                      description: |
                        The customer supplied reason code for this return.
                          - `tooBig` - Item was too large.
                          - `tooSmall` - Item was too small.
                          - `damaged` - Customer received the item damaged.
                          - `wrongItem` - Customer received the wrong item.
                          - `other` - Reason not captured in this list.
                    return_notes:
                      type: string
                      minimum: 2
                      maximum: 50
                      description: Verbose description of return reason.
                    return_inventory_status:
                      type: string
                      enum:
                        - available
                        - qc
                        - damaged
                        - quarantine
                      default: qc
                      description: |
                        The inventory status to return the units into.
                          - `available` - Make available for distribution immediately.
                          - `qc` - Put into QC process prior to making distributable.
                          - `damaged` - Put into the damaged status.
                          - `quarantine` - Return into a quaratined location and await further instructions from the customer.
                    not_on_original_rma:
                      type: boolean
                      description: If the item was received in the same parcel as the expected return items, but was not part of the return.
                    receiving_details:
                      type: object
                      description: A mapping of inventory status to details (notes and quantity) of how this RMA was received.
              version:
                type: integer
                readOnly: true
                description: |
                  Every update you make to an rma creates a new version in our system. We automatically keep track of those versions
                  and always return the most recent. A deletion will soft delete all previous versions.
              created_at:
                type: string
                format: date-time
                readOnly: true
                description: Date and Time this record was created on MasonHub's servers.
              updated_at:
                type: string
                format: date-time
                readOnly: true
                description: Date and Time of last update on MasonHub's servers.
              deleted_at:
                type: string
                format: date-time
                readOnly: true
                description: Date and Time this record was deleted from MasonHub's servers.
    callback_snapshot_ready:
      type: object
      properties:
        callback_url:
          type: string
          description: The url registered by the client for this type of callback event.
        message_type:
          type: string
          description: The type of event that triggered this callback message.
        message_id:
          type: string
          format: uuid
          description: The MasonHub unique ID for this message
        data:
          type: object
          properties:
            snapshot_id:
              type: string
              format: uuid
              description: The id of the snapshot in MasonHub's systems. Useful for debugging with MH engineers.
            download_url:
              type: string
              description: The url to follow to retrieve the prepared snapshot.
            snapshot_type:
              type: string
              description: The type of snapshot produced. Only a "full" snapshot is available at the current time.
            requested_at:
              type: string
              format: date-time
              description: Date and time of the original request.
    snapshot_request:
      type: object
      required:
        - snapshot_type
      properties:
        snapshot_type:
          type: string
          enum:
            - full
          description: |
            We are only offering the full snapshot at this time. In the future, we will add sub types like: `availableOnly`, `expeectedOnly`, etc.
            A `full` snapshot retrieves all counts from the MasonHub OMS and saves them into a JSON file for retrieval by your systems.
        snapshot_as_of_date:
          type: string
          format: date-time
          description: Setting the snapshot_as_of_date will produce a snapshot of your inventory at the provided point in time (e.g. May 31, 2019 at midnight will return a full picture of your inventory at that exact moment). Defaults to the current date and time.
    operation_result:
      type: object
      properties:
        customer_identifier:
          type: string
          minimum: 1
          maximum: 100
          description: Customer identifier for the record.
        status:
          type: string
          enum:
            - success
            - failure
          description: The result of the requested action.
        url:
          type: string
          description: url of the created or edited record.
        messages:
          type: array
          items:
            type: object
            properties:
              field_name:
                type: string
                description: name of field with error messages
              errors:
                type: array
                items:
                  type: string
    operation_result_message:
      type: object
      properties:
        field_name:
          type: string
          description: name of field with error messages
        errors:
          type: array
          items:
            type: string
    data_factory_request_create_available:
      type: object
      required:
        - action
      properties:
        sku_id:
          type: string
          format: uuid
          description: MasonHub's identifier for the sku
        quantity:
          type: number
          description: Number of units to adjust. Submitting a `0` in quantity acts as a default. When the call is received by the API, it will intepret a `0` as an empty value and add a quantity of `1` to the sku's inventory.
    data_factory_request_lose_inventory:
      type: object
      required:
        - action
      properties:
        sku_id:
          type: string
          format: uuid
          description: MasonHub's identifier for the sku
        quantity:
          type: number
          description: Number of units to adjust
    data_factory_request_ship_order:
      type: object
      properties:
        order_customer_id:
          type: string
          description: |
            Client's identifier for the order
            - Only include if wanting to ship every fulfillment on the order
            - Will not ship fulfillments that are backordered, fulfilled, or canceled
            - **MUST INCLUDE** either order_customer_id or fulfillment_id
        fulfillment_id:
          type: string
          description: |
            Identifier for the fulfillment
            - Include if wanting to ship only a specific fulfillment
            - If both fulfillment_ids and order_customer_ids are included in input, only the given fulfillment_id will be shipped
            - **MUST INCLUDE** either order_customer_id or fulfillment_id
        shipping_provider:
          type: string
          description: |
            Shipping Provider you'd like to use for this data factory request
            - Available Providers: `UPS`, `DHL`, `USPS`
            - Defaults to `UPS`. If you supply a provider not in the list (or leave blank), we will default to `UPS`.
            - **Please Note:** Available shipping providers in data factory are only meant to give you access to all possible permutations for testing. Your account manager will inform you what providers will be available to your account.
        shipper_service_level:
          type: string
          description: |
            Shipping Service Level you'd like to use for this data factory request
            - Available service levels: `Ground`, `GroundLW`, `2DayAir`, `NextDayAir`, `NextDayAirSaver`, `FirstClassMail`, `PriorityMail`
            - Defaults to `Ground`. If you supply a service level not in the list (or leave blank), we will default to `Ground`.
            - **Please Note:** Available services in data factory are only meant to give you access to all possible permutations for testing purposes. Your account manager will inform you what services will be available to your account.
        shorts:
          type: array
          description: |
            Array skus that you would like to have shorted on the order.
            You can repeat a single sku to have multiple of that sku shorted.
            If a kit, be sure to give only the SKUs of the children in that kit.
            Omit this attribute to have all items ship.
          items:
            type: string
            description: Client's identifier for the sku
        number_of_shipments:
          type: integer
          description: |
            Number_of_shipments can be used to force the order shipment to split amongst
            multiple cartons/boxes.  This is particularly useful in testing that your
            client system can accept multiple shipments and tracking numebers against
            a single order.  Omitting this attribute or setting it to 0 will result in
            it defaulting to 1 shipment.
        inventory_location_short_code:
          type: string
          description: |
            Inventory Location you would like to ship from.
            - Defaults to 'RC1' if left blank or not in the list of valid inventory location short codes.
        include_serial_ids:
          type: bool
          description: |
            T/F: Whether or not to include serial IDs for the items in the shipment.
            - Defaults to false.
        include_lot_expiry:
          type: bool
          description: |
            T/F: Whether or not to include lot numbers and their expiration dates for the items in the shipment.
            - Defaults to false.
        randomize_lot_expiry:
          type: bool
          description: |
            T/F: Whether or not to randomize lot/expiry values for each item, as opposed to having them share a static value.
            - Defaults to false.
            - If true, include_lot_expiry must also be true for this to take its effect.
    data_factory_request_order_shipment:
      type: object
      required:
        - tracking_number
        - event
      properties:
        tracking_number:
          type: string
          description: The associated tracking number for the shipment you'd like to change statuses for.
        event:
          type: string
          enum:
            - tendered
            - inTransit
            - delivered
            - undeliverable
          description: Specify whether the associated shipment/package should be marked as tendered, inTransit, delivered, or undeliverable.
    data_factory_request_resolve_order_update:
      type: object
      required:
        - resolution
      properties:
        order_update_request_id:
          type: string
          format: uuid
          description: MasonHub's UUID for the Order Update Request.  This is passed back on the response for when an Order Update Request is initially posted to the API.
        order_customer_id:
          type: string
          description: Client's identifier for the order in the update
        resolution:
          type: string
          enum:
            - success
            - failure
          description: Specify whether the update should suceed or not.  You will want to test both sucess and failures in order to ensure your client integration is handling both states correctly when the callback is posted to your endpoint.
    data_factory_request_resolve_order_cancel:
      type: object
      required:
        - resolution
      properties:
        order_customer_id:
          type: string
          description: |
            Client's identifier for the order
            - Only include if wanting to resolve every fulfillment's cancel request on an order
            - **MUST INCLUDE** either order_customer_id or fulfillment_id
        fulfillment_id:
          type: string
          description: |
            Identifier for the fulfillment
            - Include if wanting to resolve the cancellation of a specific fulfillment
            - If both fulfillment_id and order_customer_ids are included in input, only the given fulfillment_id will have its cancel request resolved
            - **MUST INCLUDE** either order_customer_id or fulfillment_id
        resolution:
          type: string
          enum:
            - success
            - failure
          description: Specify whether the cancel should suceed or not.  You will want to test both sucess and failures in order to ensure your client integration is handling both states correctly when the callback is posted to your endpoint.
    data_factory_inbound_shipment_event:
      type: object
      properties:
        customer_identifier:
          type: string
          description: Client's unique identifier for the inbound shipment.
        event:
          type: string
          description: The inboundShipmentEvent you'd like to trigger. Must be one of `onDock`, `receivingStarted`, or `receivingCompleted`.
        randomize_receipt_qty:
          type: boolean
          description: If completing receiving, send `true` in this field to simulate a quantity different than the inbound shipment line items. This is helpful when simulating an incomplete receipt. *Ignored for onDock and receivingStarted events.*
        randomize_inventory_statuses:
          type: boolean
          description: If completing receiving, send `true` in this field to simulate receiving into different inventory statuses. Will randomly place inventory into `available`, `quality-control`, `damaged`, `under-investigation`, or `refurbishing`. Can be used with `randomize_receipt_qty`. *Ignored for onDock and receivingStarted events.*
    data_factory_request_rma_event:
      type: object
      required:
        - resolution
      properties:
        customer_identifier:
          type: string
          description: Client's identifier for the rma to be targeted
        event:
          type: string
          enum:
            - receiveFull
            - receivePartial
            - receiveUnexpected
            - receivingStarted
            - tendered
            - inTransit
            - delivered
            - undeliverable
          description: Specify whether the rma should be marked as tendered, inTransit, delivered, undeliverable, fully received, partially received, or fully received with a unexpected item. Partial receipt will result in random quantities received against all skus on the rma.  Defaults to 'receiveFull'.
        randomize_inventory_statuses:
          type: boolean
          description: If completing receiving, send `true` in this field to simulate receiving into different inventory statuses. Will randomly place inventory into `available`, `quality-control`, `damaged`, `under-investigation`, or `refurbishing`.
    order_cancel_request:
      type: object
      properties:
        order_cancel_request_id:
          type: string
          format: uuid
          description: MasonHub's unique identifier for this order cancel request.
        customer_identifier:
          type: string
          minimum: 5
          maximum: 250
          description: The customer's identifier for the order to be cancelled.
    shipping_provider:
      type: string
      enum:
        - masonhub
        - UPS
        - USPS
        - DHL
        - willCall
      description: |
        The shipper to use for this package.
          - `masonhub` - Leverage MasonHub's scale to ship your packages at competitive rates.
          - `UPS` - Ship via your negotiated contract with UPS.
          - `USPS` - Ship via your negotiated contract with the United States Postal Service. Weight limits apply.
          - `DHL` - Ship via your negotiated contract with DHL.
          - `willCall` - Use only in conjunction with the Will Call service level.
        Combines with the shipper_service_level field. For internal moves like `destroy`, `quarantine`, and `packandhold`, this field will be ignored.
      default: masonhub
    shipping_service_level:
      type: string
      enum:
        - nextDay
        - standardOvernight
        - priorityOvernight
        - 2Day
        - 2-day
        - 3-day
        - guaranteed2Day
        - ground
        - groundSelect
        - priority
        - LTL
        - FTL
        - willCall
        - international
      description: |
        The type of service level required for this package.
          - `standardOvernight` - Will deliver at anytime the next day.
          - `priorityOvernight` - Will deliver next day in the morning.
          - `nextDay` - Ship next day air, find most economical price.
          - `2-day` or `2Day` - Ship via 2-Day, find the most economical price.
          - `3-day` - Ship via 3-Day, find the most economical price.
          - `guaranteed2Day` - Ship packages guaranteed 2 Day, no matter the cost.
          - `ground` - Ship this package via ground.
          - `groundSelect` - Ship this package via ground select.
          - `groundPlus` - Ship this package via the ground plus offering.
          - `priority` - USPS priority.
          - `LTL` - Less Than Truckload. Used for very large orders like wholesale.
          - `FTL` - Full Truckload. Used for very, very large orders like wholesale.
          - `willCall` - Order will be boxed and arrangements will be made with the client for pickup.
          - `international` - Ship this order internationally.

        For internal moves like `destroy`, `quarantine`, and `packandhold`, this field will be ignored.
    shipment_line_item:
      type: object
      properties:
        sku_customer_id:
          type: string
          minimum: 5
          maximum: 250
          description: The customer's identifier for this sku. This must be unique.
        quantity:
          type: integer
          format: int32
          description: Number of skus in this line item.
    order_short:
      type: object
      properties:
        sku_customer_id:
          type: string
          description: The client's identifier for this sku.
        quantity:
          type: integer
          format: int32
        reason:
          type: string
          description: The reason this item(s) was shorted
    secret:
      type: object
      required:
        - secret_phrase
      properties:
        id:
          type: string
