                              enum:
                                - LTL
                                - TL
                                - Parcel
                              description: Type of carrier carrying the inventory.
                            contact_name:
                              type: string
                              minimum: 2
                              maximum: 100
                              description: The name of the contact at the carrier.
                            street_line_one:
                              type: string
