      properties:
        customer_sku_id:
          type: string
          description: Customer's sku id.
        sku_id:
          type: string
          format: uuid
          description: MasonHub's unique identifier for the sku.
        quantity:
          type: integer
          format: int32
          description: Quantity expected in this shipment.
        box_ids:
          type: array
          items:
            type: string
          description: Unique identifier for the carton or grouping of SKUs within an ASN. Identifies which boxes contain this SKU. Required when consolidating multiple POs or when SKUs are split across multiple boxes.
        total_quantity_received:
          type: integer
          format: int32
          readOnly: true
          description: Total units received against this inbound shipment.
        not_on_original_shipment:
          type: boolean
          readOnly: true
          description: Marks this line item as a line item that wasn't original indicated on the inbound shipment. Usually do to a vendor error or other miscommunication.
        receiving_details:
          type: object
          readOnly: true
          description: A mapping of inventory status to details (notes and quantity) of how this InboundShipment was received.
    error_message:
      type: object
      properties:
        message:
          type: string
          description: The error message.
          example: This is a very important error message.
    return:
      type: object
      required:
        - customer_identifier
        - line_items
        - return_type
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: MasonHub's unique identifier for this record.
        customer_identifier:
          type: string
          minimum: 5
          maximum: 250
          description: The customer's identifier for this return. This must be unique. Can be null in the case it was created from the DC.
        manifest_id:
          type: string
          minimum: 1
          maximum: 20
          description: |
            The value passed in the manifest_id field should be human readable because the manifest_id is what your vendor, our associates, and your operations team will use to search for and discuss the related Inbound Shipment or Return.
            If your customer_identifier field is the reference number you use to reference this shipment, you may also place it in the manifest_id field. Both fields are provided to allow you to store system and human readable references with this record.
        generate_return_label:
          type: boolean
          writeOnly: true
          default: true
          description: Indicate whether to create a return label for this return. If true, customer address must be provided and package ID can be excluded. If false, customer address can be excluded but package ID must be provided.
        package_id:
          type: string
          minimum: 5
          maximum: 100
          description: The package identifier at the warehouse. Typically a tracking ID. If `generate_return_label` is true then this gets set with the generated DHL tracking number.
        return_label_url:
          readOnly: true
          type: string
          description: Link to the generated return label for this return. Requires normal API authentication to access.
        return_type:
          type: string
          enum:
            - returned_to_sender
            - rma_submitted_by_customer
            - rma_created_by_distribution_center
          description: |
            Returns can be created by a MasonHub partner off of their OMS/ERP system or they can originate at the warehouse. For most
            customers, there will be a mix of return types, which is really just a way for us to record how returns arrived on our docks.
              - `returned_to_sender` - The recipient rejected the order and it was returned to the distribution center in original packaging unopened.
              - `rma_submitted_by_customer` - The customer, in this instance, you, created the RMA in our systems and the DC knows what to expect.
              - `rma_created_by_distribution_center` - The package arrived at our distribution center without notification from our customer.
        status:
          type: string
          enum:
            - open
            - in-receiving
            - received
            - deleted
          readOnly: true
          description: |
            - `open` - Returns that have been created by our partners prior to receipt will be in the `open` status.
            Once receiving has started, the status will change to `in-receiving`.
            Once receiving has completed, the status will change to `received`, and the processed_at field will contain the processing date and time.
            Returns that are created at the distribution center will automatically be placed into the `received` status since the return can only be created once the item
            has been returned.
        customer_address_name:
          type: string
          minimum: 1
          maximum: 30
          description: Customer full name. Required only if generate_return_label = true.
        customer_address_street_line_one:
          type: string
          minimum: 1
          maximum: 40
          description: Street line one. Required only if generate_return_label = true.
        customer_address_street_line_two:
          type: string
          minimum: 1
          maximum: 40
          description: Street line two. Required only if generate_return_label = true.
        customer_address_city:
          type: string
          minimum: 1
          maximum: 30
          description: City. Required only if generate_return_label = true.
        customer_address_state:
          type: string
          minimum: 1
          maximum: 2
          description: 2 letter state code. Required only if generate_return_label = true.
        customer_address_postal_code:
          type: string
          minimum: 1
          maximum: 20
          description: Postal code. Required only if generate_return_label = true.
        customer_address_country_code:
          type: string
          minimum: 1
          maximum: 2
          description: 2 letter country code (Only 'US' supported at this time). Required only if generate_return_label = true.
        received_at:
          type: string
          format: date-time
          readOnly: true
          description: Date and time this return was processed at the DC.
        notes:
          type: string
          minimum: 0
          maximum: 250
          readOnly: true
          description: Notes on this return. Entered by warehouse Associate.
        customer_instructions:
          type: string
          minimum: 0
          maximum: 250
          description: Special instructions submitted by the customer.
        line_items:
          type: array
          items:
            type: object
            required:
              - customer_sku_id
              - quantity
              - return_reason_code
              - return_inventory_status
            properties:
              customer_order_id:
                type: string
                minimum: 2
                maximum: 100
                description: Customer identifier for the order this item was created against.
              customer_sku_id:
                type: string
                minimum: 2
                maximum: 100
                description: Customer's sku_id.
              quantity:
                type: integer
                format: int32
                description: Number of units being returned.
              quantity_received:
                type: integer
                format: int32
                description: Number of units actually received.
              return_reason_code:
                type: string
                enum:
                  - tooBig
                  - tooSmall
                  - damaged
                  - wrongItem
                  - other
                description: |
                  The customer supplied reason code for this return.
                    - `tooBig` - Item was too large.
                    - `tooSmall` - Item was too small.
                    - `damaged` - Customer received the item damaged.
                    - `wrongItem` - Customer received the wrong item.
                    - `other` - Reason not captured in this list.
              return_notes:
                type: string
                minimum: 2
                maximum: 50
                description: Verbose description of return reason.
              return_inventory_status:
                type: string
                enum:
                  - available
                  - qc
                  - damaged
                  - quarantine
                default: qc
                description: |
                  The inventory status to return the units into.
                    - `available` - Make available for distribution immediately.
                    - `qc` - Put into QC process prior to making distributable.
                    - `damaged` - Put into the damaged status.
                    - `quarantine` - Return into a quaratined location and await further instructions from the customer.
              not_on_original_rma:
                type: boolean
                description: If the item was received in the same parcel as the expected return items, but was not part of the return.
              receiving_details:
                type: object
                description: A mapping of inventory status to details (notes and quantity) of how this RMA was received.
        version:
          type: integer
          readOnly: true
          description: |
            Every update you make to an rma creates a new version in our system. We automatically keep track of those versions
            and always return the most recent. A deletion will soft delete all previous versions.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Date and Time this record was created on MasonHub's servers.
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Date and Time of last update on MasonHub's servers.
        deleted_at:
          type: string
          format: date-time
          readOnly: true
          description: Date and Time this record was deleted from MasonHub's servers.
    return_summary:
      type: object
      readOnly: true
      required:
        - number_of_returns
        - returns
      properties:
        number_of_returns:
          type: integer
          format: int32
          description: Number of returns in this summary.
        returns:
          type: array
          items:
            type: object
            readOnly: true
            required:
              - id
              - customer_order_id
              - customer_identifier
              - return_type
              - return_package_id
              - return_status
              - number_skus
              - number_units
              - processed_at
            properties:
              id:
                type: string
                format: uuid
                description: MasonHub's unique identifier for this record.
              customer_order_id:
                type: string
                minimum: 2
                maximum: 20
                description: Customer's id for related order.
              customer_identifier:
                type: string
                minimum: 5
                maximum: 250
                description: The customer's identifier for this return. This must be unique. Can be null in the case it was created from the DC.
              return_type:
                type: string
                enum:
                  - returned_to_sender
                  - rma_submitted_by_customer
                  - rma_created_by_distribution_center
                description: |
                  Returns can be created by a MasonHub partner off of their OMS/ERP system or they can originate at the warehouse. For most
                  customers, there will be a mix of return types, which is really just a way for us to record how returns arrived on our docks.
                    - `returned_to_sender` - The recipient rejected the order and it was returned to the distribution center in original packaging unopened.
                    - `rma_submitted_by_customer` - The customer, in this instance, you, created the RMA in our systems and the DC knows what to expect.
                    - `rma_created_by_distribution_center` - The package arrived at our distribution center without notification from our customer.
              return_package_id:
                type: string
                minimum: 5
                maximum: 100
                description: The package identifier at the warehouse. Typically a tracking ID. If `generate_return_label` is true then this gets set with the generated DHL tracking number.
              return_status:
                type: string
                enum:
                  - open
                  - in-receiving
                  - received
                  - deleted
                readOnly: true
                description: |
                  - `open` - Returns that have been created by our partners prior to receipt will be in the `open` status.
                  Once receiving has started, the status will change to `in-receiving`.
                  Once receiving has completed, the status will change to `received`, and the processed_at field will contain the processing date and time.
                  Returns that are created at the distribution center will automatically be placed into the `received` status since the return can only be created once the item
                  has been returned.
              number_skus:
                type: integer
                format: int32
                description: Number of skus in this return.
              number_units:
                type: integer
                format: int32
                description: Number of units in this return.
              processed_at:
                type: string
                format: date-time
                description: Date and time this return was processed at.
    callback:
      type: object
      required:
        - url
        - message_type
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: MasonHub's unique identifier for this record.
        url:
          type: string
          minimum: 1
          maximum: 250
          description: Target url for callback message
        message_type:
          type: string
          enum:
            - skuInventoryChange
            - orderEvent
            - orderUpdateResolution
            - orderCancelResolution
            - inboundShipmentEvent
            - rmaEvent
            - snapshotReady
          description: |
            Type of message for this callback.
              - `skuInventoryChange` - Inventory changes.
              - `orderEvent` - Order shipment and cancellation updates.
              - `orderUpdateResolution` - Resolutions to previously submitted order update requests
              - `orderCancelResolution` - Resolutions to previously submitted order cancel requests
              - `inboundShipmentEvent` - Inbound Shipment ondock and receiving events
              - `rmaEvent` - RMA receiving events
              - `snapshotReady` - Full snapshot is now ready for download
        api_version:
          type: string
          enum:
            - '1.0'
            - '2.0'
          description: API version to use when sending this callback to your system.
        token:
          type: string
          description: An optional string that will be sent with all outgoing instances of this particular Callback. This value can be used to authenticate Callback messages coming from MasonHub.
    callback_hold:
      type: object
      required:
        - message_type
      properties:
        message_type:
          type: string
          enum:
            - skuInventoryChange
            - orderEvent
            - orderUpdateResolution
            - orderCancelResolution
            - inboundShipmentEvent
            - rmaEvent
          description: |
            Type of message for this callback.
              - `skuInventoryChange` - Inventory changes.
              - `orderEvent` - Order shipment and cancellation updates.
              - `orderUpdateResolution` - Resolutions to previously submitted order update requests
              - `orderCancelResolution` - Resolutions to previously submitted order cancel requests
              - `inboundShipmentEvent` - Inbound Shipment ondock and receiving events
              - `rmaEvent` - RMA receiving events
        created_at:
          format: date-time
          readOnly: true
          description: Date and time in UTC this callback hold was created.
    callback_sku_snapshot:
      type: object
      properties:
        callback_url:
          type: string
          description: The url registered by the client for this type of callback event.
        message_type:
          type: string
          description: The type of event that triggered this callback message.
        message_id:
          type: string
          format: uuid
          description: The MasonHub unique ID for this message
        data:
          type: array
          items:
            type: object
            properties:
              as_of:
                type: string
                format: date-time
                description: The time at which the event took place
              customer_identifier:
                type: string
                description: The client identifier for the sku
              sku_id:
                type: string
                description: The MasonHub unique ID for the sku
              total_available_to_sell:
                type: integer
              total_units:
                type: integer
              status_counts:
                type: array
                items:
                  type: object
                  required:
                    - as_of
                    - inventory_location_address
                    - inventory_location_id
                    - inventory_status
                    - quantity
                  properties:
                    as_of:
                      type: string
                      format: date-time
                      description: Date and time this count was produced.
                    inventory_location_address:
                      type: string
                      description: Address of the warehouse at which this inventory resides
                    inventory_location_id:
                      type: string
                      format: uuid
                      description: Internal unique identifier for the warehouse
                    inventory_status:
                      type: string
                      description: Status of the inventory
                    quantity:
                      type: integer
                      description: Number of units which exist in the aforementioned status
              inventory_events:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - sku_id
                    - customer_identifier
                    - event_type
                    - quantity
                    - impact
                    - new_counts
                    - occured_at
                  properties:
                    id:
                      type: string
                      format: uuid
                      description: MasonHub's generated unique identifier for this record.
                      example: db78e8c5-hsju-4999-ae7b-57a1738uk34
                    sku_id:
                      type: string
                      format: uuid
                      description: MasonHub's unique sku identifier.
                      example: 3878e51a-f0bd-4879-9b38-05e1959b1d30
                    customer_identifier:
                      type: string
                      description: Customer's unique identifier for the sku.
                      example: pants4523
                    inventory_location_id:
                      type: string
                      format: uuid
                      description: MasonHub's center where the event occured.
                      example: 7bda07f7-be88-42dc-a26b-800e211c44f4
                    reference_uri:
                      type: string
                      description: MasonHub's internal reference for what triggered this action
                    actor_uri:
                      type: string
                      description: MasonHub's internal reference for who triggered this action
                    event_type:
                      type: string
                      enum:
                        - received
                    quantity:
                      type: integer
                      description: Number of Units affected by this event.
                      example: 34
                    occured_at:
                      type: string
                      format: date-time
                      description: Date and time of the event.
                      example: '2018-08-06T11:02:01Z'
    callback_order_event:
      type: object
      properties:
        callback_url:
          type: string
          description: The url registered by the client for this type of callback event.
        message_type:
          type: string
          description: The type of event that triggered this callback message.
        message_id:
          type: string
          format: uuid
          description: The MasonHub unique ID for this message
        data:
          type: array
          items:
            type: object
            properties:
              order_id:
                type: string
                format: uuid
                description: The MasonHub unique ID for this order
              customer_identifier:
                type: string
                description: The client identifier for this order
              status:
                type: string
                enum:
                  - open
                  - fulfilled
                  - at_warehouse
                  - in_process
                  - packed
                  - canceled
                description: The status of this order - `open` - Order has been received but is not yet being picked. - `at_warehouse` - Order has dropped to the warehouse, but has not yet been fulfilled. It may still be possible to cancel. - `in_process` - Order is in the process of being picked and packed. It may be possible to cancel. - `packed` - Order has been picked and packed and assigned shipping.  It may be possible to cancel, but is unlikely. - `fulfilled` - Order has been picked, packed, and sent. - `canceled` - Order has been canceled.
              shipments:
                type: array
                items:
                  type: object
                  properties:
                    shipment_id:
                      type: string
                      description: Unique ID for this shipment
                    shipping_provider:
                      type: string
                      enum:
                        - masonhub
                        - UPS
                        - USPS
                        - DHL
                        - willCall
                      description: |
                        The shipper to use for this package.
                          - `masonhub` - Leverage MasonHub's scale to ship your packages at competitive rates.
                          - `UPS` - Ship via your negotiated contract with UPS.
                          - `USPS` - Ship via your negotiated contract with the United States Postal Service. Weight limits apply.
                          - `DHL` - Ship via your negotiated contract with DHL.
                          - `willCall` - Use only in conjunction with the Will Call service level.
                        Combines with the shipper_service_level field. For internal moves like `destroy`, `quarantine`, and `packandhold`, this field will be ignored.
                      default: masonhub
                    shipping_service_level:
                      type: string
                      enum:
                        - nextDay
                        - standardOvernight
                        - priorityOvernight
                        - 2Day
                        - 2-day
                        - 3-day
                        - guaranteed2Day
                        - ground
                        - groundSelect
                        - priority
                        - LTL
                        - FTL
                        - willCall
                        - international
                      description: |
                        The type of service level required for this package.
                          - `standardOvernight` - Will deliver at anytime the next day.
                          - `priorityOvernight` - Will deliver next day in the morning.
                          - `nextDay` - Ship next day air, find most economical price.
                          - `2-day` or `2Day` - Ship via 2-Day, find the most economical price.
                          - `3-day` - Ship via 3-Day, find the most economical price.
                          - `guaranteed2Day` - Ship packages guaranteed 2 Day, no matter the cost.
                          - `ground` - Ship this package via ground.
                          - `groundSelect` - Ship this package via ground select.
                          - `groundPlus` - Ship this package via the ground plus offering.
                          - `priority` - USPS priority.
                          - `LTL` - Less Than Truckload. Used for very large orders like wholesale.
                          - `FTL` - Full Truckload. Used for very, very large orders like wholesale.
                          - `willCall` - Order will be boxed and arrangements will be made with the client for pickup.
                          - `international` - Ship this order internationally.

                        For internal moves like `destroy`, `quarantine`, and `packandhold`, this field will be ignored.
                    tracking_url:
                      type: string
                      description: Tracking url for this shipment
                    tracking_number:
                      type: string
                      description: Tracking number for this shipment
                    shipment_date_time:
                      type: string
                      format: date-time
                      description: Date and time this shipment left the warehouse.
                    shipment_line_items:
                      type: array
                      items:
                        type: object
                        properties:
                          sku_customer_id:
                            type: string
                            minimum: 5
                            maximum: 250
                            description: The customer's identifier for this sku. This must be unique.
                          quantity:
                            type: integer
                            format: int32
                            description: Number of skus in this line item.
              shorts:
                type: array
                items:
                  type: object
                  properties:
                    sku_customer_id:
                      type: string
                      description: The client's identifier for this sku.
                    quantity:
                      type: integer
                      format: int32
                    reason:
                      type: string
                      description: The reason this item(s) was shorted
    callback_order_update_resolution:
