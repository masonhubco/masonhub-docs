  /snapshot_request:
    post:
      tags:
        - Inventory
      summary: Request a Full Snapshot
      description: |
        A full inventory snapshot can be very large depending on the number of active skus in your account. We prevent the synchronous retrieval of snapshots
        via the `/sku_snapshot` endpoint of anything over 3,000 lines. If you run into that limitation on the sku_snapshot endpoint, you can issue a POST to
        the snapshot_request endpoint. This will start an asynchronous job that will prepare a JSON file using the same models as the sku_snapshot endpoint.
        Once that process has finished, the OMS will send a callback to your system with a download url. You can then download and process the snapshot asynchronously.
        Some notes on the full snapshot:
          - A full snapshot can be quite large. Because we capture 14 different inventory statuses, each sku can have 14 lines per fulfillment center. In practice, most skus in a single FC will average between 3 and 4 status counts.
            This makes for a very large file. 10,000 active skus could have as many as 50,000+ lines in a JSON file.
          - Before requesting your first snapshot, you must first register for the `snapshotReady` callback. See the callbacks section below.
          - You can only have one outstanding snapshot in processing at any given time. If you submit a request while another request is running, the OMS will return a `399` error code in the body of the response.
          - Depending on the size of your active inventory, a full snapshot can take some time to prepare. Don't worry, we will let you know when it's done.
      requestBody:
        description: Snapshot Type to create
        content:
          application/json:
            schema:
              type: object
              required:
                - snapshot_type
              properties:
                snapshot_type:
                  type: string
                  enum:
                    - full
                  description: |
                    We are only offering the full snapshot at this time. In the future, we will add sub types like: `availableOnly`, `expeectedOnly`, etc.
                    A `full` snapshot retrieves all counts from the MasonHub OMS and saves them into a JSON file for retrieval by your systems.
                snapshot_as_of_date:
                  type: string
                  format: date-time
                  description: Setting the snapshot_as_of_date will produce a snapshot of your inventory at the provided point in time (e.g. May 31, 2019 at midnight will return a full picture of your inventory at that exact moment). Defaults to the current date and time.
            examples:
              posted_skus:
                summary: Snapshot Request
                value:
                  snapshot_type: full
                  snapshot_as_of_date: '2019-08-05T08:15:30-07:00'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - customer_identifier
                    - status
                    - messages
                  properties:
                    records_submitted:
                      type: integer
                      description: Number of records submitted in the request.
                    records_processed:
                      type: integer
                      description: Number of records actually processed.
                    records_failed:
                      type: integer
                      description: Number of records rejected by the server for validation reasons.
                    records_succeeded:
                      type: integer
                      description: Number of records that passed validation and queued up for action on the MasonHub server.
                    results:
                      type: array
                      items:
                        type: object
                        properties:
                          customer_identifier:
                            type: string
                            minimum: 1
                            maximum: 100
                            description: Customer identifier for the record.
                          status:
                            type: string
                            enum:
                              - success
                              - failure
                            description: The result of the requested action.
                          url:
                            type: string
                            description: url of the created or edited record.
                          messages:
                            type: array
                            items:
                              type: object
                              properties:
                                field_name:
                                  type: string
                                  description: name of field with error messages
                                errors:
                                  type: array
                                  items:
                                    type: string
                  summary: Response for posted Skus
                  value:
                    records_submitted: 2
                    records_processed: 2
                    records_failed: 1
                    records_succeeded: 1
                    results:
                      - customer_identifier: shirts34563
                        status: Success
                        url: https://app.masonhub.co/demo_account/api/v1/skus?id=shirts34563
                      - customer_identifier: shirts450293
                        status: Failure
                        messages:
                          - customer_identifier:
                              - '301: ''shirts450293'' is already taken and ''customer_identifier'' must be unique'
              examples:
                post_snapshot_request:
                  summary: Simple Response to Snapshot Request
                  value:
                    system_id: full
                    status: success
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: The error message.
                    example: This is a very important error message.
              example:
                message: The access token provided is missing or invlid.
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: The error message.
                    example: This is a very important error message.
              example:
                message: Your request was not signed or the signature didn't match our records.
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: The error message.
                    example: This is a very important error message.
              example:
                message: Something went wrong and all we got was this very, very unsatisfying message. Our engineers have already been notified and will look into it. If the problem continues, please email support@masonhub.co
