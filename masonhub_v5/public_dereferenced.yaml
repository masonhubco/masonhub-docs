              reason:
                type: string
                description: Provides reason for failure, if known
              created_at:
                type: string
                format: date-time
                readOnly: true
                description: Date and Time this record was created on MasonHub's servers.
              updated_at:
                type: string
                format: date-time
                readOnly: true
                description: Date and Time of last update on MasonHub's servers.
              deleted_at:
