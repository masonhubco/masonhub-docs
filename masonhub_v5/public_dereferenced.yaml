                          description: State/Locale for the shipper.
                        shipper_country:
                          type: string
                          minimum: 2
                          maximum: 2
                          description: Shipper Country.
                        expected_arrival_date:
                          type: string
                          format: date-time
                          description: Date this shipment is expected to arrive.
                        arrived_at:
                          type: string
                          format: date-time
                          readOnly: true
                          description: Date and time this shipment actually arrived on the MasonHub loading dock.
                        started_receiving_at:
                          type: string
