  /data_factory/shipOrder:
    post:
      tags:
        - DataFactory
      summary: Ship Order
      description: |
        Create a shipment against an order and send the subsequent callback to the client's registered orderEvent callback url
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  order_customer_id:
                    type: string
                    description: |
                      Client's identifier for the order
                      - Only include if wanting to ship every fulfillment on the order
                      - Will not ship fulfillments that are backordered, fulfilled, or canceled
                      - **MUST INCLUDE** either order_customer_id or fulfillment_id
                  fulfillment_id:
                    type: string
                    description: |
                      Identifier for the fulfillment
                      - Include if wanting to ship only a specific fulfillment
                      - If both fulfillment_ids and order_customer_ids are included in input, only the given fulfillment_id will be shipped
                      - **MUST INCLUDE** either order_customer_id or fulfillment_id
                  shipping_provider:
                    type: string
                    description: |
                      Shipping Provider you'd like to use for this data factory request
                      - Available Providers: `UPS`, `DHL`, `USPS`
                      - Defaults to `UPS`. If you supply a provider not in the list (or leave blank), we will default to `UPS`.
                      - **Please Note:** Available shipping providers in data factory are only meant to give you access to all possible permutations for testing. Your account manager will inform you what providers will be available to your account.
                  shipper_service_level:
                    type: string
                    description: |
                      Shipping Service Level you'd like to use for this data factory request
                      - Available service levels: `Ground`, `GroundLW`, `2DayAir`, `NextDayAir`, `NextDayAirSaver`, `FirstClassMail`, `PriorityMail`
                      - Defaults to `Ground`. If you supply a service level not in the list (or leave blank), we will default to `Ground`.
                      - **Please Note:** Available services in data factory are only meant to give you access to all possible permutations for testing purposes. Your account manager will inform you what services will be available to your account.
                  shorts:
                    type: array
                    description: |
                      Array skus that you would like to have shorted on the order.
                      You can repeat a single sku to have multiple of that sku shorted.
                      If a kit, be sure to give only the SKUs of the children in that kit.
                      Omit this attribute to have all items ship.
                    items:
                      type: string
                      description: Client's identifier for the sku
                  number_of_shipments:
                    type: integer
                    description: |
                      Number_of_shipments can be used to force the order shipment to split amongst
                      multiple cartons/boxes.  This is particularly useful in testing that your
                      client system can accept multiple shipments and tracking numebers against
                      a single order.  Omitting this attribute or setting it to 0 will result in
                      it defaulting to 1 shipment.
                  inventory_location_short_code:
                    type: string
                    description: |
                      Inventory Location you would like to ship from.
                      - Defaults to 'RC1' if left blank or not in the list of valid inventory location short codes.
                  include_serial_ids:
                    type: bool
                    description: |
                      T/F: Whether or not to include serial IDs for the items in the shipment.
                      - Defaults to false.
                  include_lot_expiry:
                    type: bool
                    description: |
                      T/F: Whether or not to include lot numbers and their expiration dates for the items in the shipment.
                      - Defaults to false.
                  randomize_lot_expiry:
                    type: bool
                    description: |
                      T/F: Whether or not to randomize lot/expiry values for each item, as opposed to having them share a static value.
                      - Defaults to false.
                      - If true, include_lot_expiry must also be true for this to take its effect.
            examples:
              posted_skus:
                summary: An example of a data factory request
                value:
                  - order_customer_id: '123456'
                    shipping_provider: UPS
                    shipper_service_level: GROUND
                    inventory_location_short_code: RC1
                    include_serial_ids: true
                  - fulfillment_id: '987654'
                    shorts:
                      - pants44lg
                      - pants36lg
                    number_of_shipments: 2
                    include_lot_expiry: true
                    randomize_lot_expiry: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - customer_identifier
                    - status
                    - messages
                  properties:
                    records_submitted:
                      type: integer
                      description: Number of records submitted in the request.
                    records_processed:
                      type: integer
                      description: Number of records actually processed.
                    records_failed:
                      type: integer
                      description: Number of records rejected by the server for validation reasons.
                    records_succeeded:
                      type: integer
                      description: Number of records that passed validation and queued up for action on the MasonHub server.
                    results:
