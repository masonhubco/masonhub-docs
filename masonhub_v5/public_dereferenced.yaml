    post:
      tags:
        - Callback Events
      summary: Order Update Resolutions
      description: |
        This callback gets sent whenever a pending order update request is determined to have succeeded or failed.
        Order updates are asynchronous, so any order updates posted to the API should not be assumed to have been propagated until a callback of this type explicitly identifies it as a success.
      requestBody:
        description: An array of orderUpdateResolution objects
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  callback_url:
                    type: string
                    description: The url registered by the client for this type of callback event.
                  message_type:
                    type: string
                    description: The type of event that triggered this callback message.
                  message_id:
                    type: string
                    format: uuid
                    description: The MasonHub unique ID for this message
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                          description: The MasonHub unique ID for the order update request
                        customer_order_id:
                          type: string
                          description: The client identifier for the order on the update request
                        status:
                          type: string
                          enum:
                            - success
                            - failure
                          description: Indicates whether this update was successful or not
                        reason:
