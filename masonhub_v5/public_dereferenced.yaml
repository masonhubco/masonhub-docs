        '200':
          description: OK
        '500':
          description: Server Error
        description: Responses coming from the client server.
  /orderEvent:
    post:
      tags:
        - Callback Events
      summary: Order Events
      description: |
        The Order Event callback gives your system updates as an order progresses through it's lifecycle. These are sent in real-time, so you'll know the moment an order has been received at the Warehouse, being picked or delivered to your customer.

        The following Order Event statuses are sent via callback:
          * `atWarehouse` - The order has been synchronized with our distribution center's systems. When an order is first submitted, it has a status of `open`, but as soon as it has been confirmed in the WMS (Warehouse Management System), we mark it as `atWarehouse` and send your system this callback.
          * `inProcess` - The order has been waved (assigned to an associate to be picked) at the distribution center and is on it's way to being fulfilled.
          * `packed` - The order has been fully packed and is ready for its shipping label.
          * `fulfilled` - A shipping label has been printed and the package is now ready for pickup by the carrier. This callback will contain extra data regarding the shipment. It will have tracking information, skus and quantities. This message can be used by your system to notify your customer that their order has been shipped.
          * `partiallyTendered` - At least one package has been scanned at the carrier's facility.
          * `tendered` - All associated packages have been scanned at the carrier's facility.
          * `partiallyInTransit` - At least one of this order's packages are enroute to their final destination.
          * `inTransit` - All associated packages are enroute to their final destination.
          * `partiallyDelivered` - At least one package has been delivered for this order.
          * `delivered` - All packages have been delivered for this order.
          * `undeliverable` - All packages were unable to be delivered by the carrier.

        **Please Note:** Only DHL Ecommerce Packages have updated carrier statuses (tendered, inTransit, delivered, undeliverable). More carriers are coming soon.
      requestBody:
        description: An array of orderEvent objects
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  callback_url:
                    type: string
                    description: The url registered by the client for this type of callback event.
                  message_type:
                    type: string
                    description: The type of event that triggered this callback message.
                  message_id:
                    type: string
                    format: uuid
                    description: The MasonHub unique ID for this message
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        order_id:
                          type: string
                          format: uuid
                          description: The MasonHub unique ID for this order
                        customer_identifier:
                          type: string
                          description: The client identifier for this order
                        status:
                          type: string
                          enum:
                            - open
                            - fulfilled
                            - at_warehouse
                            - in_process
                            - packed
                            - canceled
                          description: The status of this order - `open` - Order has been received but is not yet being picked. - `at_warehouse` - Order has dropped to the warehouse, but has not yet been fulfilled. It may still be possible to cancel. - `in_process` - Order is in the process of being picked and packed. It may be possible to cancel. - `packed` - Order has been picked and packed and assigned shipping.  It may be possible to cancel, but is unlikely. - `fulfilled` - Order has been picked, packed, and sent. - `canceled` - Order has been canceled.
                        shipments:
                          type: array
                          items:
                            type: object
                            properties:
                              shipment_id:
                                type: string
                                description: Unique ID for this shipment
                              shipping_provider:
                                type: string
                                enum:
                                  - masonhub
                                  - UPS
                                  - USPS
                                  - DHL
                                  - willCall
                                description: |
                                  The shipper to use for this package.
                                    - `masonhub` - Leverage MasonHub's scale to ship your packages at competitive rates.
                                    - `UPS` - Ship via your negotiated contract with UPS.
                                    - `USPS` - Ship via your negotiated contract with the United States Postal Service. Weight limits apply.
                                    - `DHL` - Ship via your negotiated contract with DHL.
                                    - `willCall` - Use only in conjunction with the Will Call service level.
                                  Combines with the shipper_service_level field. For internal moves like `destroy`, `quarantine`, and `packandhold`, this field will be ignored.
                                default: masonhub
                              shipping_service_level:
                                type: string
                                enum:
                                  - nextDay
                                  - standardOvernight
                                  - priorityOvernight
                                  - 2Day
                                  - 2-day
                                  - 3-day
                                  - guaranteed2Day
                                  - ground
                                  - groundSelect
                                  - priority
                                  - LTL
                                  - FTL
                                  - willCall
                                  - international
                                description: |
                                  The type of service level required for this package.
                                    - `standardOvernight` - Will deliver at anytime the next day.
                                    - `priorityOvernight` - Will deliver next day in the morning.
                                    - `nextDay` - Ship next day air, find most economical price.
                                    - `2-day` or `2Day` - Ship via 2-Day, find the most economical price.
                                    - `3-day` - Ship via 3-Day, find the most economical price.
                                    - `guaranteed2Day` - Ship packages guaranteed 2 Day, no matter the cost.
                                    - `ground` - Ship this package via ground.
                                    - `groundSelect` - Ship this package via ground select.
                                    - `groundPlus` - Ship this package via the ground plus offering.
                                    - `priority` - USPS priority.
                                    - `LTL` - Less Than Truckload. Used for very large orders like wholesale.
                                    - `FTL` - Full Truckload. Used for very, very large orders like wholesale.
                                    - `willCall` - Order will be boxed and arrangements will be made with the client for pickup.
                                    - `international` - Ship this order internationally.

                                  For internal moves like `destroy`, `quarantine`, and `packandhold`, this field will be ignored.
                              tracking_url:
                                type: string
                                description: Tracking url for this shipment
                              tracking_number:
                                type: string
                                description: Tracking number for this shipment
                              shipment_date_time:
                                type: string
                                format: date-time
                                description: Date and time this shipment left the warehouse.
                              shipment_line_items:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    sku_customer_id:
                                      type: string
                                      minimum: 5
                                      maximum: 250
                                      description: The customer's identifier for this sku. This must be unique.
                                    quantity:
                                      type: integer
                                      format: int32
                                      description: Number of skus in this line item.
                        shorts:
                          type: array
                          items:
                            type: object
                            properties:
                              sku_customer_id:
                                type: string
                                description: The client's identifier for this sku.
                              quantity:
                                type: integer
                                format: int32
                              reason:
                                type: string
                                description: The reason this item(s) was shorted
              maxItems: 30
            examples:
              posted_order_event_callback:
                summary: CALLBACK - order event sent to preconfigured endpoint
                value:
                  callback_url: https://client.com/api/orderEvent
                  message_type: orderEvent
                  message_id: 0896116f-e54b-4756-9d3e-1b0c4a25d821
