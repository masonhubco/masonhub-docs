    post:
      tags:
        - Inbound Shipments / ASN
      summary: Create Inbound Shipments (ASN)
      description: List of inbound shipments and their data to create. See Help Article [here](https://support.masonhub.co/hc/en-us/articles/29418343657620-Creating-Inbound-Shipment-ASNs-with-More-than-One-Purchase-Order-Reference).
      requestBody:
        description: List of inbound shipments and their data to create.
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required:
                  - customer_identifier
                  - manifest_id
                  - purchase_order_name
                  - customer_purchase_order_id
                  - inventory_location_id
                  - expected_arrival_date
                  - shipper_name
                properties:
                  id:
                    type: string
                    format: uuid
                    readOnly: true
                    description: MasonHub's unique identifier for this record.
                  customer_identifier:
                    type: string
                    minimum: 5
                    maximum: 250
                    description: The customer's system identifier for this object. This must be unique to each record. MasonHub will pass this id back in all callbacks to customer endpoints.
                  customer_purchase_order_id:
                    type: string
                    minimum: 1
                    maximum: 250
                    description: The customer's system identifier for the related purchase order. This is non-unique and can be reused in the MasonHub system since PO's often have more than one shipment.
                  manifest_id:
                    type: string
                    minimum: 1
                    maximum: 20
                    description: |
                      The value passed in the manifest_id field should be human readable because the manifest_id is what your vendor, our associates, and your operations team will use to search for and discuss the related Inbound Shipment or Return.
                      If your customer_identifier field is the reference number you use to reference this shipment, you may also place it in the manifest_id field. Both fields are provided to allow you to store system and human readable references with this record.
                  purchase_order_name:
                    type: string
                    minimum: 1
                    maximum: 20
                    description: |
                      The purchase_order_name for this inbound shipment. Used primarily as a reference for our associates in receiving to identify or find the inbound shipment in our systems.
                      This is often the only identifier some vendors will use to identify the shipment arriving on dock, so it is essential to have the information your merchandising team and vendors used when organizing the shipment.
                      If you used the customer_purchase_order_id value as the reference value, you may also put it in the purchase_order_name field. Both fields are provided in the API to allow for system references and human friendly references.
                      If your ID's are human friendly, feel free to repeat the data.
                  inventory_location_id:
                    type: string
                    format: uuid
                    description: The MasonHub uuid for the distribution center or other channel.
                  inventory_location_address:
                    type: string
                    readOnly: true
                    description: The address for the distribution center.
                  status:
                    type: string
                    enum:
                      - open
                      - in-receiving
                      - received
                      - deleted
                    readOnly: true
                    description: The status of this inbound shipment. This is not updateable by clients directly. To remove an inbound shipment, issue a delete.
                  inbound_shipment_category:
                    type: string
                    minimum: 1
                    maximum: 20
                    description: The category of this inbound shipment. Much like the product category on the sku, this is customer driven and can be used for tracking inbound shipments in your ERP.
                  carrier_information:
                    type: object
                    required:
                      - carrier_name
                      - carrier_type
                    properties:
                      name:
                        type: string
                        minimum: 2
                        maximum: 100
                        description: Name of carrier.
                      type:
                        type: string
                        enum:
                          - LTL
                          - TL
                          - Parcel
                        description: Type of carrier carrying the inventory.
                      contact_name:
                        type: string
                        minimum: 2
                        maximum: 100
                        description: The name of the contact at the carrier.
                      street_line_one:
                        type: string
                        minimum: 5
                        maximum: 100
                        description: Street Address Line 1.
                      street_line_two:
                        type: string
                        minimum: 5
                        maximum: 100
                        description: Street Address Line 2.
                      street_line_three:
                        type: string
                        minimum: 5
                        maximum: 100
                        description: Street Address Line 3.
                      city:
                        type: string
                        minimum: 2
                        maximum: 100
                        description: Address City.
                      locale:
                        type: string
                        minimum: 2
                        maximum: 100
                        description: State/Province/Locale for this address.
                      country:
                        type: string
                        minimum: 2
                        maximum: 40
                        description: Country for this address.
                      postal_code:
                        type: string
                        minimum: 5
                        maximum: 10
                        description: Postal/Zip code for this address.
                      phone_number:
                        type: string
                        minimum: 10
                        maximum: 15
                        description: Phone number for the named individual.
                      driver_name:
                        type: string
                        minimum: 2
                        maximum: 50
                      driver_phone:
                        type: string
                        minimum: 10
                        maximum: 15
                        description: The phone number for the driver at the carrier.
                  tracking_number:
                    type: string
                    minimum: 1
                    maximum: 50
                    description: Tracking number for this shipment
                  tracking_url:
                    type: string
                    description: Optional tracking url for the inbound package. Only use if a tracking url is available from your shipping partner.
                  box_ids:
                    type: array
                    items:
                      type: string
                    description: Unique identifier for the carton or grouping of SKUs within an ASN. Required when consolidating multiple POs or when SKUs are split across multiple boxes.
                  shipper_name:
                    type: string
                    minimum: 2
                    maximum: 150
                    description: Name of shipper for this shipment.
                  shipper_city:
                    type: string
                    minimum: 2
                    maximum: 100
                    description: City of this shipper.
                  shipper_locale:
                    type: string
                    minimum: 2
                    maximum: 10
                    description: State/Locale for the shipper.
                  shipper_country:
                    type: string
                    minimum: 2
                    maximum: 2
                    description: Shipper Country.
                  expected_arrival_date:
                    type: string
                    format: date-time
                    description: Date this shipment is expected to arrive.
                  arrived_at:
                    type: string
                    format: date-time
                    readOnly: true
                    description: Date and time this shipment actually arrived on the MasonHub loading dock.
                  started_receiving_at:
                    type: string
                    format: date-time
                    readOnly: true
                    description: Date and time MaosnHub began receiving this inbound shipment.
                  finished_receiving_at:
                    type: string
                    format: date-time
                    readOnly: true
                    description: Date and time this shipment was fully received by MasonHub.
                  exceptions:
                    type: string
                    readOnly: true
                    description: Comments entered by receiving personel denoting exceptions made or found during thr receiving process.
                  special_instructions:
                    type: string
                    description: Optional instructions to perform on receipt of this inbound shipment.
                  comments:
                    type: string
                    minimum: 0
                    maximum: 250
                    description: Comments for this inbound shipment.
                  line_items:
                    type: array
                    items:
                      type: object
                      required:
                        - customer_sku_id
                        - quantity
                      properties:
                        customer_sku_id:
                          type: string
                          description: Customer's sku id.
                        sku_id:
                          type: string
                          format: uuid
                          description: MasonHub's unique identifier for the sku.
                        quantity:
                          type: integer
                          format: int32
                          description: Quantity expected in this shipment.
                        box_ids:
                          type: array
                          items:
                            type: string
                          description: Unique identifier for the carton or grouping of SKUs within an ASN. Identifies which boxes contain this SKU. Required when consolidating multiple POs or when SKUs are split across multiple boxes.
                        total_quantity_received:
                          type: integer
                          format: int32
                          readOnly: true
                          description: Total units received against this inbound shipment.
                        not_on_original_shipment:
                          type: boolean
                          readOnly: true
                          description: Marks this line item as a line item that wasn't original indicated on the inbound shipment. Usually do to a vendor error or other miscommunication.
                        receiving_details:
                          type: object
                          readOnly: true
                          description: A mapping of inventory status to details (notes and quantity) of how this InboundShipment was received.
                  version:
                    type: integer
                    readOnly: true
                    description: |
                      Every update you make to an inbound shipment creates a new version in our system. We automatically keep track of those versions
                      and always return the most recent. A deletion will soft delete all previous versions.
                  created_at:
                    type: string
                    format: date-time
                    readOnly: true
                    description: Date and Time this record was created on MasonHub's servers.
                  updated_at:
                    type: string
                    format: date-time
                    readOnly: true
                    description: Date and Time of last update on MasonHub's servers.
                  deleted_at:
                    type: string
                    format: date-time
                    readOnly: true
                    description: Date amd Time this record was deleted from MasonHub's servers.
              maxItems: 30
            examples:
              posted_inbound_shipments:
                summary: Array of Inbound Shipments for creation
                value:
                  - customer_identifier: shipment32432
                    customer_purchase_order_id: po234532
                    inventory_location_id: 52c7c6ee-6e63-4f25-db83-c987fc52116c
                    carrier_information:
                      name: Frank's Red Hot Carrier
                      type: TL
                      contact_name: John Jacob
                      driver_name: Donny James
                      driver_phone: 555-343-4213
                    tracking_number: '356732154'
                    box_ids:
                      - box-001
                      - box-002
                      - box-003
                    shipper: Freddie's Pirate Army
                    shipper_city: Kalamazoo
                    shipper_locale: MI
                    shipper_country: US
                    expected_arrival_date: '2018-12-11T10:00:00Z'
                    special_instructions: When receiving the shirts, it's important that they are folded during put away using the provided folding template.
                    comments: These shipments often come mixed.
                    line_items:
                      - customer_sku_id: shirt-534212
                        quantity: 100
                        box_ids:
                          - box-001
                          - box-002
                      - customer_sku_id: pant-342353
                        quantity: 100
                        box_ids:
                          - box-003
                  - customer_identifier: shipment32476
                    customer_purchase_order_id: po854456
                    inventory_location_id: 52c7c6ee-6e63-4f25-db83-c987fc52116c
                    carrier_information:
                      name: Melinda's Super Hot Carrier
                      type: LTL
                      contact_name: John Jacob
                      driver_name: Donny James
                      driver_phone: 555-343-4213
                    tracking_number: '356732154'
                    shipper: Freddie's Pirate Army
                    shipper_city: Kalamazoo
                    shipper_locale: MI
                    shipper_country: US
                    expected_arrival_date: '2018-12-18T10:00:00Z'
                    special_instructions: When receiving the shirts, it's important that they are folded during put away using the provided folding template.
                    comments: These shipments often come mixed.
                    line_items:
                      - customer_sku_id: shirt-32423
                        quantity: 50
                      - customer_sku_id: shirt-674556
                        quantity: 45
                      - customer_sku_id: pant-764543
                        quantity: 10
                      - customer_sku_id: short-63453
                        quantity: 500
                      - customer_sku_id: jammies-63432
                        quantity: 200
                      - customer_sku_id: shirt-56342
                        quantity: 150
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - customer_identifier
                    - status
                    - messages
                  properties:
                    records_submitted:
                      type: integer
                      description: Number of records submitted in the request.
                    records_processed:
