    order:
      type: object
      required:
        - customer_identifier
        - order_type
        - shipper_service_level
        - shipping_provider
        - shipping_address_name
        - shipping_address_street_line_one
        - shipping_address_city
        - shipping_address_locale
        - shipping_address_postal_code
        - shipping_address_country_code
        - submitted_at
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: MasonHub's unique identifier for this record.
        customer_identifier:
          type: string
          minimum: 5
          maximum: 250
          description: The customer's system identifier for this object. This must be unique to each record. MasonHub will pass this id back in all callbacks to customer endpoints.
        packing_slip_order_id:
          type: string
          minimum: 1
          maximum: 22
          description: A different order identifier to use on the packing slip. If not supplied, the customer_identifier will be present on the packing slip. Does not have to be unique.
        order_type:
          type: string
          enum:
            - customer
            - destroy
            - packAndHold
            - quarantine
            - returnToVendor
            - transfer
            - wholesale
            - workOrder
            - dropship
          description: |
            Let the WMS know what type of Order this is:
              - `customer` - Ships direct to the customer.
              - `destroy` - Destroy this inventory and remove from inventory counts.
              - `packAndHold` - Transfer inventory from sellable inventory into deep storage. Used often for pre-season buys.
              - `quarantine` - Remove the identified inventory from sellable inventory and hold for future instructions. Inventory will show up in inventory counts but won't be sellable.
              - `returnToVendor` - Ship the items back to the vendor.
              - `transfer` - Move this inventory to another facility.
              - `wholesale` - An order of bulk goods shipped to a retail trading partner’s store or distribution center for sell at their stores or online.
              - `workOrder` - Request to build pre-kitted inventory from components to sell.
              - `dropship`  - An order made through a retail trading partner that MasonHub will ship directly to their end customer.
          default: customer
        status:
          type: string
          enum:
            - open
            - fulfilled
            - at_warehouse
            - in_process
            - packed
            - canceled
          description: The status of this order - `open` - Order has been received but is not yet being picked. - `at_warehouse` - Order has dropped to the warehouse, but has not yet been fulfilled. It may still be possible to cancel. - `in_process` - Order is in the process of being picked and packed. It may be possible to cancel. - `packed` - Order has been picked and packed and assigned shipping.  It may be possible to cancel, but is unlikely. - `fulfilled` - Order has been picked, packed, and sent. - `canceled` - Order has been canceled.
          readOnly: true
        priority:
          type: integer
          format: int32
          minimum: 1
          maximum: 10000
          default: 100
          description: |
            The priority number for this order. A priority of 1 should only be used in special circumstances. For example:
              - An order for a VIP customer.
              - A wholesale order to replenish a store's depleted inventory.
              - A customer service support order.
            A Priority **1** order will put it at the top of the distributioin center's queue and ensure it is picked first. If you overuse Priority 1 orders,
            All orders will be the same priority. Use it sparingly.
        shipping_provider:
          type: string
          enum:
            - masonhub
            - UPS
            - USPS
            - DHL
            - willCall
          description: |
            The shipper to use for this package.
              - `masonhub` - Leverage MasonHub's scale to ship your packages at competitive rates.
              - `UPS` - Ship via your negotiated contract with UPS.
              - `USPS` - Ship via your negotiated contract with the United States Postal Service. Weight limits apply.
              - `DHL` - Ship via your negotiated contract with DHL.
              - `willCall` - Use only in conjunction with the Will Call service level.
            Combines with the shipper_service_level field. For internal moves like `destroy`, `quarantine`, and `packandhold`, this field will be ignored.
          default: masonhub
        shipper_service_level:
          type: string
          enum:
            - nextDay
            - standardOvernight
            - priorityOvernight
            - 2Day
            - 2-day
            - 3-day
            - guaranteed2Day
            - ground
            - groundSelect
            - priority
            - LTL
            - FTL
            - willCall
            - international
          description: |
            The type of service level required for this package.
              - `standardOvernight` - Will deliver at anytime the next day.
              - `priorityOvernight` - Will deliver next day in the morning.
              - `nextDay` - Ship next day air, find most economical price.
              - `2-day` or `2Day` - Ship via 2-Day, find the most economical price.
              - `3-day` - Ship via 3-Day, find the most economical price.
              - `guaranteed2Day` - Ship packages guaranteed 2 Day, no matter the cost.
              - `ground` - Ship this package via ground.
              - `groundSelect` - Ship this package via ground select.
              - `groundPlus` - Ship this package via the ground plus offering.
              - `priority` - USPS priority.
              - `LTL` - Less Than Truckload. Used for very large orders like wholesale.
              - `FTL` - Full Truckload. Used for very, very large orders like wholesale.
              - `willCall` - Order will be boxed and arrangements will be made with the client for pickup.
              - `international` - Ship this order internationally.

            For internal moves like `destroy`, `quarantine`, and `packandhold`, this field will be ignored.
        value_added_services:
          type: array
          items:
            type: string
          minItems: 0
          maxItems: 10
          description: List of Value Added Service identifiers to include on the order.  The available Value Added Services for each client will be coordinated offline.
        gift_message:
          type: string
          maximum: 500
          description: Gift Message to print on packing slip. Leave blank to skip.
        special_instructions:
          type: string
          description: Special instructions required for this order.
        customer_email:
          type: string
          description: Email address for the named individual.
        shipping_address_name:
          type: string
          minimum: 1
          maximum: 150
          description: Recipient Full Name.
        shipping_address_street_line_one:
          type: string
          minimum: 5
          maximum: 100
          description: Street Address Line 1.
        shipping_address_street_line_two:
          type: string
          minimum: 5
          maximum: 100
          description: Street Address Line 2.
        shipping_address_city:
          type: string
          minimum: 2
          maximum: 100
          description: Address City.
        shipping_address_locale:
          type: string
          minimum: 2
          maximum: 100
          description: State/Province/Locale for this address.
        shipping_address_postal_code:
          type: string
          minimum: 5
          maximum: 10
          description: Postal/Zip code for this address.
        shipping_address_country_code:
          type: string
          minimum: 0
          maximum: 3
          description: Country Code for this address.
        shipping_address_phone_number:
          type: string
          minimum: 10
          maximum: 15
          description: Phone number for the named individual.
        billing_address_name:
          type: string
          minimum: 1
          maximum: 150
          description: Recipient Full Name.
        billing_address_street_line_one:
          type: string
          minimum: 5
          maximum: 100
          description: Street Address Line 1.
        billing_address_street_line_two:
          type: string
          minimum: 5
          maximum: 100
          description: Street Address Line 2.
        billing_address_city:
          type: string
          minimum: 2
          maximum: 100
          description: Address City.
        billing_address_locale:
          type: string
          minimum: 2
          maximum: 100
          description: State/Province/Locale for this address.
        billing_address_postal_code:
          type: string
          minimum: 5
          maximum: 10
          description: Postal/Zip code for this address.
        billing_address_country_code:
          type: string
          minimum: 0
          maximum: 3
          description: Country Code for this address.
        billing_address_phone_number:
          type: string
          minimum: 10
          maximum: 15
          description: Phone number for the named individual.
        billing_address_address_type:
          type: string
          enum:
            - residential
            - business
          description: Is this a business or residential address?
        order_localization:
          type: object
          properties:
            country_code:
              type: string
              minimum: 0
              maximum: 2
              description: Two-letter shipping address country code.
            tax_id_value:
              type: string
              description: |
                Customers personal customs code or tax identification number required by certain countries on international orders. For example, these countries require an ID to be included on customs invoices when we ship an order: \
                Brazil: CPF number \
                South Korea: Personal Customs Code \
                China: Resident ID number \
                Italy: Codice Fiscale and PEC
        backorder_policy:
          type: string
          enum:
            - forceBackorder
            - default
          description: |
            When not supplied, or when `default` is given as the backorder_policy, Orders will attempt to allocate first from on-hand inventory and then allocate from oversellable inventory into backorder. When `forceBackorder` is given as the backorder_policy, the OMS will still attempt
            to take from available on-hand inventory and then from oversellable, but if there is not enough oversellable or on-hand inventory, it will force any remaining units into backorder.
        routing_policy:
          type: string
          enum:
            - ManualRouting
            - DestinationOnly
            - DestinationAndInventory
          description: |
            You can utilize flexible order routing policies to optimize order fulfillment across multiple facilities. 
            Your account will be configured with a default routing policy, which you can override with this attribute and an accepted value. 
            If `ManualRouting` is selected, you will be required to set a forced_inventory_location_id to route the order to a facility. 
            Visit this Help Center article for more information:
            https://support.masonhub.co/hc/en-us/articles/4410143798676
        forced_inventory_location_id:
          type: string
          format: uuid
          description: |
            The MasonHub uuid for the fulfillment facility where you want to manually route your order. 
            This is required when you set routing_policy: `ManualRouting` and will be ignored if other routing policies are selected. 
            You can only use facilities that are enabled for your account.
        split_policy:
          type: string
          enum:
            - manual
            - auto
          description: |
            This policy allows you to split orders into multiple fulfillments for backorders and multiple facilities. 
            Your account will be configured with a default order split policy, 
            which you can override with this attribute and accepted value. 
            Visit this Help Center article for more information: 
            https://support.masonhub.co/hc/en-us/articles/4410143798676
        submitted_at:
          type: string
          format: date-time
          description: Date and Time the order was placed in the client's system.
        ship_after_date:
          type: string
          format: date-time
          description: This specifies the first day when the shipment should leave the warehouse, as indicated by your wholesale retailer. This is the start of the ship window, and shipping earlier than the date provided by your retail can lead to chargebacks.
        ship_before_date:
          type: string
          format: date-time
          description: This specifies the last day when the shipment should leave the warehouse, as indicated by your wholesale retailer. This is the end of the ship window — sometimes called the cancel date — and shipping later than the date provided by your retailer can lead to chargebacks.
        department:
          type: string
          description: Name or number identifying area where merchandise is categorized within a store. (Only used for wholesale order labels).
        master_po_number:
          type: string
          description: Identifying number for the purchase order assigned by the buying organization. This is the master order number not split by store. (Only used for wholesale order labels)
        final_destination_location:
          type: string
          description: Normally the store number or distribution center number, the location id of the final destination. (Only used for wholesale order labels).
        trade_partner_name:
          type: string
          description: Name of the Trade Partner such as "Sephora" or "Kohls". (Only used for wholesale order labels).
        vendor_number:
          type: string
          description: Trade Partner assigned vendor number for the supplier. (Only used for wholesale order labels).
        distribution_center:
          type: string
          description: Only used in cross dock scenario not required when DC is final destination see final_destination_location. (Only used for wholesale order labels).
        edi_field_one:
          type: string
          description: Only used for specific trade partner requirements outside of the above fields. Please reach out to our integrations team if there is an extra wholesale EDI field needed. (Optional for wholesale order labels).
        edi_field_two:
          type: string
          description: Only used for specific trade partner requirements outside of the above fields. Please reach out to our integrations team if there is an extra wholesale EDI field needed. (Optional for wholesale order labels).
        edi_field_three:
          type: string
          description: Only used for specific trade partner requirements outside of the above fields. Please reach out to our integrations team if there is an extra wholesale EDI field needed. (Optional for wholesale order labels).
        edi_field_four:
          type: string
          description: Only used for specific trade partner requirements outside of the above fields. Please reach out to our integrations team if there is an extra wholesale EDI field needed. (Optional for wholesale order labels).
        currency_code:
          type: string
          minimum: 1
          maximum: 3
          description: The currency used on the order (ex USD).
        total_line_items_price:
          type: number
          format: double
          description: Total price of order before discounts applied.
        total_discounts:
          type: number
          format: double
          description: Sum of the line item discounts. (Our system has logic on our side that will split this across fulfillment and shipments so that the proper value of the items in the actual shipment for customs is correct.)
        total_price:
          type: number
          format: double
          description: Total price of order minus total discounts.
        meta_data:
          type: object
          description: |
            A flexible metadata field that can contain additional information about the order, provided as key-value pairs.. For example, 
                  meta_data: {
                    "receipt_number" : 12345,
                    "subscription_order": true,
                    "additional_vas_tags": ["USE_SPECIAL_PACKING", "SPRING_SALE"]
                  }     
        line_items:
          type: array
          items:
            type: object
            required:
              - sku_customer_id
              - quantity
            properties:
              sku_customer_id:
                type: string
                description: Customer Sku ID of the items being included in this order.
              quantity:
                type: integer
                format: int32
              price:
                type: number
                format: double
                description: |
                  Unit price for each line on the order. (Example: line item with unit price of $40 with a qty of 2 for a total line price of $80, we would expect “40” to be passed on the payload).
              total_discount:
                type: number
                format: double
                description: |
                  Line item discount. (If not provided, our system will use the total_discounts on the order and split the amount evenly amount all line items on the fulfillment and shipments so that the proper value of the items in the actual shipment for customs is correct.)    
              promised_delivery_date:
                type: string
                format: date-time
                description: When were these units promised to arrive at the customer?
              estimated_delivery_date:
                type: string
                format: date-time
                description: What was your estimate for the delivery of this package?
