  /data_factory/inboundShipmentEvent:
    post:
      tags:
        - DataFactory
      summary: Trigger Inbound Shipment Event
      description: |
        Force an inbound shipment into one of three statuses, `onDock`, `receivingStarted`, and `receivingCompleted`. The onDock and receivingStarted changes are events that do not impact
        inventory totals. The receivingCompleted event will simulate the receipt of inventory into the distribution center. This event triggers a skuInventoryChange event and an inboundShipmentEvent.
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  customer_identifier:
                    type: string
                    description: Client's unique identifier for the inbound shipment.
                  event:
                    type: string
                    description: The inboundShipmentEvent you'd like to trigger. Must be one of `onDock`, `receivingStarted`, or `receivingCompleted`.
                  randomize_receipt_qty:
                    type: boolean
                    description: If completing receiving, send `true` in this field to simulate a quantity different than the inbound shipment line items. This is helpful when simulating an incomplete receipt. *Ignored for onDock and receivingStarted events.*
                  randomize_inventory_statuses:
                    type: boolean
                    description: If completing receiving, send `true` in this field to simulate receiving into different inventory statuses. Will randomly place inventory into `available`, `quality-control`, `damaged`, `under-investigation`, or `refurbishing`. Can be used with `randomize_receipt_qty`. *Ignored for onDock and receivingStarted events.*
            examples:
              posted_skus:
                summary: Data Factory Inbound Shipment Event
                value:
                  - customer_identifier: shipment3241
                    event: onDock
                  - customer_identifier: shipment2345234
                    event: receivingCompleted
                    randomize_receipt_qty: true
                    randomize_inventory_statuses: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - customer_identifier
                    - status
                    - messages
                  properties:
                    records_submitted:
                      type: integer
                      description: Number of records submitted in the request.
                    records_processed:
                      type: integer
                      description: Number of records actually processed.
                    records_failed:
                      type: integer
                      description: Number of records rejected by the server for validation reasons.
                    records_succeeded:
                      type: integer
                      description: Number of records that passed validation and queued up for action on the MasonHub server.
                    results:
                      type: array
                      items:
                        type: object
                        properties:
                          customer_identifier:
                            type: string
                            minimum: 1
                            maximum: 100
                            description: Customer identifier for the record.
                          status:
                            type: string
                            enum:
                              - success
                              - failure
                            description: The result of the requested action.
                          url:
                            type: string
                            description: url of the created or edited record.
                          messages:
                            type: array
                            items:
                              type: object
                              properties:
                                field_name:
                                  type: string
                                  description: name of field with error messages
                                errors:
                                  type: array
                                  items:
                                    type: string
                  summary: Response for posted Skus
                  value:
                    records_submitted: 2
                    records_processed: 2
                    records_failed: 1
                    records_succeeded: 1
                    results:
                      - customer_identifier: shirts34563
                        status: Success
                        url: https://app.masonhub.co/demo_account/api/v1/skus?id=shirts34563
                      - customer_identifier: shirts450293
                        status: Failure
                        messages:
                          - customer_identifier:
                              - '301: ''shirts450293'' is already taken and ''customer_identifier'' must be unique'
              examples:
                post_inb_ship:
                  summary: Data Factory Inbound Shipment Response
                  value:
                    - records_submitted: 1
                      records_processed: 1
                      records_failed: 0
                      records_succeeded: 1
                      results:
