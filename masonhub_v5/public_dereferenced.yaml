  /inbound_shipments:
    get:
      tags:
        - Inbound Shipments / ASN
      summary: Get Inbound Shipments (ASN)
      description: |
        Inbound Shipments are the equivalent of an ASN (Advance Ship Notice) or EDI 943. While it would be typical to send an entire purchase order
        down to your 3PL, it's not really necessary. The information MasonHub needs to receive product is to understand what is arriving and when. The Inbound Shipment
        model provides more than enough information to do that. In addition to the normal search parameters, you can also search via your internal purchase order id.

        Get returns one or more inbound shipments based on the parameters submitted in the query string. For example:
          - `https://app.masonhub.co/[account name]/api/v1/inbound_shipments?cpid=po23421&list_type=summary`
          - `https://app.masonhub.co/[account name]/api/v1/inbound_shipments?status=open&list_type=summary`
      parameters:
        - in: query
          name: id
          description: |
            Include an array of MasonHub UUID's to find. For example:
              - `api/v1/[resource name]?id=baf403aa-c577-4425-b6d8-d34d1c6658cb,baf403aa-c577-4425-b6d8-d34d1c6658df`
              - `api/v1/[resource name]?id=baf403aa-c577-4425-b6d8-d34d1c6658cb&include_counts=true`
            Only use the ID field if you're searching via MasonHub's system ID. Use `cid` to search for items via your customer_identifier.
          schema:
            type: array
            items:
              type: string
              format: uuid
            minItems: 1
            maxItems: 30
          style: form
        - in: query
          name: cid
          description: |
            Include an array of customer_identifiers's to find. For example:
              - `api/v1/[resource name]?cid=132,421,pants2332`
              - `api/v1/[resource name]?cid=pants2332&include_counts=true`
            The customer_identifier values represent the values you use in your system to idenfify your records.
          schema:
            type: array
            items:
              type: string
            minItems: 1
            maxItems: 30
          style: form
        - in: query
          name: cpid
          description: |
            Include an array of customer_purchase_order_id's to find. For example:
              - `api/v1/[resource name]?cpid=po12434,po4672333,pants2332`
              - `api/v1/[resource name]?cpid=po23423&include_actuals=true`
            The `cpid` values represent the values you use in your system to idenfify your purchase orders.
          schema:
            type: array
            items:
              type: string
              minItems: 1
              maxItems: 30
            style: form
        - in: query
          name: status
          description: What item status would you like to retrieve. Defaults to `all`. Use `status` in the resource definition for directions.
          schema:
            type: string
            default: null
        - in: query
          name: sdt
          description: |
            Start date and time that the system will query for. If no end date and time are provided, it will return the first 100 after the supplied start date and time.
            All date/time records should be submitted in RFC3339 format ("2018-10-21T14:00:21Z" or "2018-10-21T14:00:21-05:00"). This field queries ASNs for the expected arrival dates.
          schema:
            type: string
            format: date-time
        - in: query
          name: edt
          description: |
            Add an end date and time to search for events before. *If sdt/start date and time is left blank, query will return records before this date and time.*
            All date/time records should be submitted in RFC3339 format ("2018-10-21T14:00:21Z" or "2018-10-21T14:00:21-05:00").
          schema:
            type: string
            format: date-time
        - in: query
          name: offset
          description: |
            Add an offset to start the record set at. Returns the record inclusive of the offset number. `?offset=100` will return the 100th record and the records thereafter. If limit is not included, query will return the next 100 records.
          schema:
            type: integer
            format: int32
            default: 0
        - in: query
          name: limit
          description: Add a limit to the number of records to return. If no limit is provided, query will return the next 100 records.
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 100
        - in: query
          name: list_type
          description: |
            Determines what type of list the API returns.
              - `Detail` will return the full representation of the resource with all included sub resources.
              - `Summary` will return a collapsed top-level summary of the resource without sub resources.
              -  *All other criteria apply.*
          schema:
            type: string
            enum:
              - detail
              - summary
            default: detail
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    summary: Inbound Shipment Details
                    items:
                      type: object
                      required:
                        - customer_identifier
                        - manifest_id
                        - purchase_order_name
                        - customer_purchase_order_id
                        - inventory_location_id
                        - expected_arrival_date
                        - shipper_name
                      properties:
                        id:
                          type: string
                          format: uuid
                          readOnly: true
                          description: MasonHub's unique identifier for this record.
                        customer_identifier:
                          type: string
                          minimum: 5
                          maximum: 250
                          description: The customer's system identifier for this object. This must be unique to each record. MasonHub will pass this id back in all callbacks to customer endpoints.
                        customer_purchase_order_id:
                          type: string
                          minimum: 1
                          maximum: 250
                          description: The customer's system identifier for the related purchase order. This is non-unique and can be reused in the MasonHub system since PO's often have more than one shipment.
                        manifest_id:
                          type: string
                          minimum: 1
                          maximum: 20
                          description: |
                            The value passed in the manifest_id field should be human readable because the manifest_id is what your vendor, our associates, and your operations team will use to search for and discuss the related Inbound Shipment or Return.
                            If your customer_identifier field is the reference number you use to reference this shipment, you may also place it in the manifest_id field. Both fields are provided to allow you to store system and human readable references with this record.
                        purchase_order_name:
                          type: string
                          minimum: 1
                          maximum: 20
                          description: |
                            The purchase_order_name for this inbound shipment. Used primarily as a reference for our associates in receiving to identify or find the inbound shipment in our systems.
                            This is often the only identifier some vendors will use to identify the shipment arriving on dock, so it is essential to have the information your merchandising team and vendors used when organizing the shipment.
                            If you used the customer_purchase_order_id value as the reference value, you may also put it in the purchase_order_name field. Both fields are provided in the API to allow for system references and human friendly references.
                            If your ID's are human friendly, feel free to repeat the data.
                        inventory_location_id:
                          type: string
                          format: uuid
                          description: The MasonHub uuid for the distribution center or other channel.
                        inventory_location_address:
                          type: string
                          readOnly: true
                          description: The address for the distribution center.
                        status:
                          type: string
                          enum:
                            - open
                            - in-receiving
                            - received
                            - deleted
                          readOnly: true
                          description: The status of this inbound shipment. This is not updateable by clients directly. To remove an inbound shipment, issue a delete.
                        inbound_shipment_category:
                          type: string
                          minimum: 1
                          maximum: 20
                          description: The category of this inbound shipment. Much like the product category on the sku, this is customer driven and can be used for tracking inbound shipments in your ERP.
                        carrier_information:
                          type: object
                          required:
                            - carrier_name
                            - carrier_type
                          properties:
                            name:
                              type: string
                              minimum: 2
                              maximum: 100
                              description: Name of carrier.
                            type:
