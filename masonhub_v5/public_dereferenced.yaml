  /skuInventoryChange:
    post:
      tags:
        - Callback Events
      summary: Sku Inventory Change Events
      description: |
        This callback gets sent when there is an event either in the Order Management System or the distribution center that impacts inventory levels. For example, inventory will change for a sku when an order is place, an inbound shipment is created, an order is shipped, etc.
        We recommend that your system listen to the skuInventoryChange event as the main source of truth for all inventory levels. The MasonHub OMS sends a skuInventoryChange event when items are received, orders are shipped, or inventory is moved in the distribution center.
        This may seem counter-intuitive, because we also send return, receiving, and order shipment details which contain levels received or shipped. But we believe it's a good idea to decouple the two pieces and it makes code simpler. You only have to listen to
        the skuInventoryChange and you will never have to work with Deltas and worry about drift between our system and yours, because the counts we send you in the skuInventoryChange are the current up-to-the-second counts for the sku.

        Inventory statuses will fall into one of the following categories:
          * `expected` - Inventory that is expected to arrive at one of MasonHub's distribution centers. Units are counted as expected when they are on open or onDock  inbound shipments / ASN's or customer returns.
          * `available` - Inventory is available and ready to pick at the distribution center. Units are considered available when they are in a pickable location in one of our distribution centers.
          * `damaged` - Inventory has been moved into a damaged state. Units are considered damaged when an associate discovers a flaw either during receipt (often during the receipt of an RMA) or other normal warehouse operations. Damaged units are held for review by the client.
          * `lost` - Inventory has been lost at the distribution center. Units are lost when we can no longer match up our available count to what we have in the distribution center. Lost units decrement available inventory.
          * `backordered` - Inventory that has been backordered and that will be fulfilled as soon as units have been received at the facility.
          * `received` - Inventory that has not yet been putaway for picking. Received is a transient status for units that are on their way to a pickable location. It is rare for any units to be reported as a `received` but we do record the movement in our ledger.
          * `allocated` - Inventory has been allocated to an order. Allocated units have not yet been picked and placed in an order, and they are also not sellable. The allocated inventory status correlates with open orders.
          * `quality-control`- Inventory that is under review by our inventory control team. Quality Control units are often received in a customer return and require extra scrutiny before being made available.
          * `kit-to-ship-available` - Inventory that is made available based on the child skus assigned during sku creation or update. Kit To Ship available is dynamically recalculated as individual child units are received or shipped.
          * `oversellable` - Inventory that has been made available via an oversell policy. Units in an oversellable state can be placed on backorder. 
          * `under-investigation` - Inventory that has been allocated to an order but needs inventory control review before being shipped.
          * `refurbishing` - Inventory that has been received but is getting refurbished as per the clients instructions (e.g. units that are being dry cleaned).
          * `destroyed` - Inventory that has been destroyed as per the clients instructions.
          * `relabeled` - Inventory that was incorrectly labeled as one sku and must be assigned to the correct sku. There will be a corresponding increment to available inventory in the correct sku.
          * `consumed` - Inventory that has been consumed during normal business operations (e.g. packaging tape, tissue paper, boxes).
          * `shipped` - Inventory that has been placed on an order and shipped. Shipped units have left one of MasonHub's distribution centers and are no longer in our posession.
      requestBody:
        description: An array of skuInventoryChange events
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  callback_url:
                    type: string
                    description: The url registered by the client for this type of callback event.
                  message_type:
                    type: string
                    description: The type of event that triggered this callback message.
                  message_id:
                    type: string
                    format: uuid
                    description: The MasonHub unique ID for this message
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        as_of:
                          type: string
                          format: date-time
                          description: The time at which the event took place
                        customer_identifier:
                          type: string
                          description: The client identifier for the sku
                        sku_id:
                          type: string
                          description: The MasonHub unique ID for the sku
                        total_available_to_sell:
                          type: integer
                        total_units:
                          type: integer
                        status_counts:
                          type: array
                          items:
                            type: object
                            required:
                              - as_of
                              - inventory_location_address
                              - inventory_location_id
                              - inventory_status
                              - quantity
                            properties:
                              as_of:
                                type: string
                                format: date-time
                                description: Date and time this count was produced.
                              inventory_location_address:
                                type: string
                                description: Address of the warehouse at which this inventory resides
                              inventory_location_id:
                                type: string
                                format: uuid
                                description: Internal unique identifier for the warehouse
                              inventory_status:
                                type: string
                                description: Status of the inventory
                              quantity:
                                type: integer
                                description: Number of units which exist in the aforementioned status
                        inventory_events:
                          type: array
                          items:
                            type: object
                            required:
                              - id
                              - sku_id
                              - customer_identifier
                              - event_type
                              - quantity
                              - impact
                              - new_counts
                              - occured_at
                            properties:
                              id:
                                type: string
                                format: uuid
                                description: MasonHub's generated unique identifier for this record.
                                example: db78e8c5-hsju-4999-ae7b-57a1738uk34
                              sku_id:
                                type: string
                                format: uuid
                                description: MasonHub's unique sku identifier.
                                example: 3878e51a-f0bd-4879-9b38-05e1959b1d30
                              customer_identifier:
                                type: string
                                description: Customer's unique identifier for the sku.
                                example: pants4523
                              inventory_location_id:
                                type: string
                                format: uuid
                                description: MasonHub's center where the event occured.
                                example: 7bda07f7-be88-42dc-a26b-800e211c44f4
                              reference_uri:
                                type: string
                                description: MasonHub's internal reference for what triggered this action
                              actor_uri:
                                type: string
                                description: MasonHub's internal reference for who triggered this action
                              event_type:
                                type: string
                                enum:
                                  - received
                              quantity:
                                type: integer
                                description: Number of Units affected by this event.
                                example: 34
                              occured_at:
                                type: string
                                format: date-time
                                description: Date and time of the event.
                                example: '2018-08-06T11:02:01Z'
              maxItems: 30
            examples:
              posted_sku_snapshot_callback:
