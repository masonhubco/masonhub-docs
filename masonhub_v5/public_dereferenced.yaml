                            street_line_two:
                              type: string
                              minimum: 5
                              maximum: 100
                              description: Street Address Line 2.
                            street_line_three:
                              type: string
                              minimum: 5
                              maximum: 100
                              description: Street Address Line 3.
                            city:
                              type: string
                              minimum: 2
                              maximum: 100
                              description: Address City.
                            locale:
                              type: string
                              minimum: 2
                              maximum: 100
                              description: State/Province/Locale for this address.
                            country:
                              type: string
                              minimum: 2
                              maximum: 40
                              description: Country for this address.
                            postal_code:
                              type: string
                              minimum: 5
                              maximum: 10
                              description: Postal/Zip code for this address.
                            phone_number:
                              type: string
                              minimum: 10
                              maximum: 15
                              description: Phone number for the named individual.
                            driver_name:
                              type: string
                              minimum: 2
                              maximum: 50
                            driver_phone:
                              type: string
                              minimum: 10
                              maximum: 15
                              description: The phone number for the driver at the carrier.
                        tracking_number:
                          type: string
                          minimum: 1
                          maximum: 50
                          description: Tracking number for this shipment
                        tracking_url:
                          type: string
                          description: Optional tracking url for the inbound package. Only use if a tracking url is available from your shipping partner.
                        box_ids:
                          type: array
                          items:
                            type: string
                          description: Unique identifier for the carton or grouping of SKUs within an ASN. Required when consolidating multiple POs or when SKUs are split across multiple boxes.
                        shipper_name:
                          type: string
                          minimum: 2
                          maximum: 150
                          description: Name of shipper for this shipment.
                        shipper_city:
                          type: string
                          minimum: 2
                          maximum: 100
                          description: City of this shipper.
                        shipper_locale:
                          type: string
