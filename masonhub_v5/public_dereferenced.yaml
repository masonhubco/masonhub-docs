                        billing_address_country_code:
                          type: string
                          minimum: 0
                          maximum: 3
                          description: Country Code for this address.
                        billing_address_phone_number:
                          type: string
                          minimum: 10
                          maximum: 15
                          description: Phone number for the named individual.
                        billing_address_address_type:
                          type: string
                          enum:
                            - residential
                            - business
                          description: Is this a business or residential address?
                        order_localization:
                          type: object
                          properties:
                            country_code:
                              type: string
                              minimum: 0
                              maximum: 2
                              description: Two-letter shipping address country code.
                            tax_id_value:
                              type: string
                              description: |
                                Customers personal customs code or tax identification number required by certain countries on international orders. For example, these countries require an ID to be included on customs invoices when we ship an order: \
                                Brazil: CPF number \
                                South Korea: Personal Customs Code \
                                China: Resident ID number \
                                Italy: Codice Fiscale and PEC
                        backorder_policy:
                          type: string
                          enum:
                            - forceBackorder
                            - default
                          description: |
                            When not supplied, or when `default` is given as the backorder_policy, Orders will attempt to allocate first from on-hand inventory and then allocate from oversellable inventory into backorder. When `forceBackorder` is given as the backorder_policy, the OMS will still attempt
                            to take from available on-hand inventory and then from oversellable, but if there is not enough oversellable or on-hand inventory, it will force any remaining units into backorder.
                        routing_policy:
                          type: string
                          enum:
                            - ManualRouting
                            - DestinationOnly
                            - DestinationAndInventory
                          description: |
                            You can utilize flexible order routing policies to optimize order fulfillment across multiple facilities. 
                            Your account will be configured with a default routing policy, which you can override with this attribute and an accepted value. 
                            If `ManualRouting` is selected, you will be required to set a forced_inventory_location_id to route the order to a facility. 
                            Visit this Help Center article for more information:
                            https://support.masonhub.co/hc/en-us/articles/4410143798676
                        forced_inventory_location_id:
                          type: string
                          format: uuid
                          description: |
                            The MasonHub uuid for the fulfillment facility where you want to manually route your order. 
                            This is required when you set routing_policy: `ManualRouting` and will be ignored if other routing policies are selected. 
                            You can only use facilities that are enabled for your account.
                        split_policy:
                          type: string
                          enum:
                            - manual
                            - auto
                          description: |
                            This policy allows you to split orders into multiple fulfillments for backorders and multiple facilities. 
                            Your account will be configured with a default order split policy, 
                            which you can override with this attribute and accepted value. 
                            Visit this Help Center article for more information: 
                            https://support.masonhub.co/hc/en-us/articles/4410143798676
                        submitted_at:
                          type: string
                          format: date-time
                          description: Date and Time the order was placed in the client's system.
                        ship_after_date:
                          type: string
                          format: date-time
                          description: This specifies the first day when the shipment should leave the warehouse, as indicated by your wholesale retailer. This is the start of the ship window, and shipping earlier than the date provided by your retail can lead to chargebacks.
                        ship_before_date:
                          type: string
                          format: date-time
                          description: This specifies the last day when the shipment should leave the warehouse, as indicated by your wholesale retailer. This is the end of the ship window — sometimes called the cancel date — and shipping later than the date provided by your retailer can lead to chargebacks.
                        department:
                          type: string
                          description: Name or number identifying area where merchandise is categorized within a store. (Only used for wholesale order labels).
                        master_po_number:
                          type: string
                          description: Identifying number for the purchase order assigned by the buying organization. This is the master order number not split by store. (Only used for wholesale order labels)
                        final_destination_location:
                          type: string
                          description: Normally the store number or distribution center number, the location id of the final destination. (Only used for wholesale order labels).
                        trade_partner_name:
                          type: string
                          description: Name of the Trade Partner such as "Sephora" or "Kohls". (Only used for wholesale order labels).
                        vendor_number:
                          type: string
                          description: Trade Partner assigned vendor number for the supplier. (Only used for wholesale order labels).
                        distribution_center:
                          type: string
                          description: Only used in cross dock scenario not required when DC is final destination see final_destination_location. (Only used for wholesale order labels).
                        edi_field_one:
                          type: string
                          description: Only used for specific trade partner requirements outside of the above fields. Please reach out to our integrations team if there is an extra wholesale EDI field needed. (Optional for wholesale order labels).
                        edi_field_two:
                          type: string
                          description: Only used for specific trade partner requirements outside of the above fields. Please reach out to our integrations team if there is an extra wholesale EDI field needed. (Optional for wholesale order labels).
                        edi_field_three:
                          type: string
                          description: Only used for specific trade partner requirements outside of the above fields. Please reach out to our integrations team if there is an extra wholesale EDI field needed. (Optional for wholesale order labels).
                        edi_field_four:
                          type: string
                          description: Only used for specific trade partner requirements outside of the above fields. Please reach out to our integrations team if there is an extra wholesale EDI field needed. (Optional for wholesale order labels).
                        currency_code:
                          type: string
                          minimum: 1
                          maximum: 3
                          description: The currency used on the order (ex USD).
                        total_line_items_price:
                          type: number
                          format: double
                          description: Total price of order before discounts applied.
                        total_discounts:
                          type: number
                          format: double
                          description: Sum of the line item discounts. (Our system has logic on our side that will split this across fulfillment and shipments so that the proper value of the items in the actual shipment for customs is correct.)
                        total_price:
                          type: number
                          format: double
                          description: Total price of order minus total discounts.
                        meta_data:
                          type: object
                          description: |
                            A flexible metadata field that can contain additional information about the order, provided as key-value pairs.. For example, 
                                  meta_data: {
                                    "receipt_number" : 12345,
                                    "subscription_order": true,
                                    "additional_vas_tags": ["USE_SPECIAL_PACKING", "SPRING_SALE"]
                                  }     
                        line_items:
                          type: array
                          items:
                            type: object
                            required:
                              - sku_customer_id
                              - quantity
                            properties:
                              sku_customer_id:
                                type: string
                                description: Customer Sku ID of the items being included in this order.
                              quantity:
                                type: integer
                                format: int32
                              price:
                                type: number
                                format: double
                                description: |
                                  Unit price for each line on the order. (Example: line item with unit price of $40 with a qty of 2 for a total line price of $80, we would expect “40” to be passed on the payload).
                              total_discount:
                                type: number
                                format: double
                                description: |
                                  Line item discount. (If not provided, our system will use the total_discounts on the order and split the amount evenly amount all line items on the fulfillment and shipments so that the proper value of the items in the actual shipment for customs is correct.)    
                              promised_delivery_date:
                                type: string
                                format: date-time
                                description: When were these units promised to arrive at the customer?
                              estimated_delivery_date:
                                type: string
                                format: date-time
                                description: What was your estimate for the delivery of this package?
                              buyer_part_number:
                                type: string
                                description: Buyer's primary product identifier (Only used for wholesale order labels)
                        shipments:
                          type: array
                          items:
                            type: object
                            readOnly: true
                            properties:
                              id:
                                type: string
                                format: uuid
                                description: MasonHub's unique identifier for this record.
                              shipment_id:
                                type: string
                                description: Shipping system's identifier for this shipment.
                              status:
                                type: string
                                description: The current status for this shipment. Can be one of the following statuses (`manifested`, `tendered`, `inTransit`, `delivered`, `undeliverable`).
                              customer_order_id:
                                type: string
                                description: Customer identifier for the related order.
                              shipping_provider:
                                type: string
                                enum:
                                  - UPS
                                  - USPS
                                  - DHL
                                  - LTL
                                  - FTL
                                description: Shipment provider for this order.
                              shipper_service_level:
                                type: string
                                description: Shipment service level by provider. Economy, 2-Day, Express Saver, etc.
                              tracking_number:
                                type: string
                                description: Tracking number for this provider.
                              tracking_url:
                                type: string
                                description: Tracking url for this shipment.
                              shipment_date_time:
                                type: string
                                format: date-time
                                description: Date and time this shipment left the warehouse.
                              shipment_line_items:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    sku_customer_id:
                                      type: string
                                      minimum: 5
                                      maximum: 250
                                      description: The customer's identifier for this sku. This must be unique.
                                    quantity:
                                      type: integer
                                      format: int32
                                      description: Number of skus in this line item.
                          readOnly: true
                        shorts:
                          type: array
                          items:
                            type: object
                            properties:
