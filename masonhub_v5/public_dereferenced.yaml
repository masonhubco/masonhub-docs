    put:
      tags:
        - Catalog
      summary: Update Skus on the Item Master
      description: |
        Takes one or more skus and attempts to update the catalog in MasonHub's systems. Uses the customer_identifier to locate the sku.

        *Important Note:* Always send the entire sku in the request body. Whatever you send will completely replace an existing Sku
        in MasonHub's systems. We have elected not to use the PATCH verb to avoid complicating your integrations with us.
      requestBody:
        description: List of Skus to update.
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required:
                  - customer_identifier
                  - customer_bar_code
                  - brand_name
                  - product_name
                  - product_category
                  - product_sub_category
                  - product_description
                  - customer_brand_code
                  - vendor_brand_code
                properties:
                  id:
                    type: string
                    format: uuid
                    readOnly: true
                    description: MasonHub's unique identifier for this record.
                  customer_identifier:
                    type: string
                    minimum: 2
                    maximum: 250
                    description: The customer's system identifier for this object. This must be unique to each record. MasonHub will pass this id back in all callbacks to customer endpoints.
                  customer_bar_code:
                    type: string
                    minimum: 5
                    maximum: 20
                    description: |
                      Customer provided bar code for this SKU. If no bar code is provided in either the customer or vendor bar code fields, MasonHub will assign one for tracking in the distribution center. Sku addition will fail if the submitted bar code already belongs to another sku in your account.
                  vendor_bar_code:
                    type: string
                    minimum: 5
                    maximum: 20
                    description: Vendor provided bar code for receiving. Should be UPC code if provided. Should be null if it hasn't been provided.
                  bar_codes:
                    type: array
                    minimum: 5
                    maximum: 20
                    description: Additional bar codes to include for this item. All provided bar codes must be unique to this item. Each must be between 5 and 20 chars.
                  vendor_style:
                    type: string
                    minimum: 1
                    maximum: 40
                    description: Vendor style code for item identification.
                  pick_style:
                    type: string
                    enum:
                      - FIFO
                      - FEFO
                      - LIFO
                    description: |
                      This is the method the WMS will use to determine how units should be picked.
                        - `FIFO` - First In First Out
                        - `FEFO` - First Expired First Out
                        - `LIFO` - Last In Last Out
                    default: FIFO
                  image_url:
                    type: string
                    description: |
                      The url for an image of the product. It's not required, but will be used by associates in the warehouse during receiving, picking, and packing operations.
                  brand_name:
                    type: string
                    minimum: 2
                    maximum: 100
                    description: Non-unique brand name for this sku and product.
                  product_name:
                    type: string
                    minimum: 2
                    maximum: 150
                    description: Non-unique product name for this sku.
                  product_category:
                    type: string
                    minimum: 1
                    maximum: 100
                    description: Non-unique product category for this sku.
                  product_sub_category:
                    type: string
                    minimum: 1
                    maximum: 100
                    description: Non-unique product category for this sku.
                  product_description:
                    type: string
                    minimum: 5
                    maximum: 250
                    description: Description of the product.
                  vendor_brand_code:
                    type: string
                    minimum: 1
                    maximum: 100
                    description: Non-unique vendor provided brand code for identifying this sku.
                  customer_brand_code:
                    type: string
                    minimum: 1
                    maximum: 100
                    description: Brand code provided by the customer. Used on packing lists.
                  customer_color:
                    type: string
                    minimum: 1
                    maximum: 100
                    description: Color used on distribution center labels and on packing lists.
                  vendor_color:
                    type: string
                    minimum: 1
                    maximum: 100
                    description: Vendor provided color used during receiving to identify products.
                  size:
                    type: string
                    minimum: 1
                    maximum: 20
                    description: Size of sku
                  vendor_size:
                    type: string
                    minimum: 1
                    maximum: 20
                    description: Vendor-specified size of sku
                  ormd:
                    type: boolean
                    default: false
                    description: Indicates to the warehouse that this sku contains a hazardous material that requires special handling during shipping.
                  lot_controlled:
                    type: boolean
                    default: false
                    description: Indicates to the distribution center that we should track and control the lot this sku was received into.
                  lot:
                    type: string
                    readOnly: true
                    minimum: 10
                    maximum: 100
                    description: The lot as indicated during receiving.
                  unit_cost:
                    type: number
                    format: double
                    description: Cost to the customer for this unit.
                  price:
                    type: number
                    format: double
                    description: Price to the customer for this unit. Used on packing slips.
                  is_kit:
                    type: boolean
                    description: |
                      This sku is the parent made up of multiple skus and should be either pre-built as a kit or can be built on demand, 'kit to ship'. **Note:** Skus can be updated via API to become kit skus (changing `is_kit` from `false` to `true`),  but converting kit skus into non-kit skus (changing `is_kit` from `true` to `false`) is not supported via API.
                    default: false
                  kit_skus:
                    type: array
                    description: |
                      For kit skus, this is the list of child skus that should make up that kit. **Note:** The `kit_skus` list can be updated via API while converting a non-kit sku into a kit sku, but adding or removing `kit_skus` on an existing kit sku via API is not supported.
