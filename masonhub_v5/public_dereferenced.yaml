  /data_factory/rmaEvent:
    post:
      tags:
        - DataFactory
      summary: RMA Event
      description: |
        Simulate that an RMA is received at the distribution center.  You have the option of triggering a full or partial receipt of the items on the RMA.  In the case of partial,
        the API will randomly generate quantities, based on the sku quantities on the rma, to receive.
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required:
                  - resolution
                properties:
                  customer_identifier:
                    type: string
                    description: Client's identifier for the rma to be targeted
                  event:
                    type: string
                    enum:
                      - receiveFull
                      - receivePartial
                      - receiveUnexpected
                      - receivingStarted
                      - tendered
                      - inTransit
                      - delivered
                      - undeliverable
                    description: Specify whether the rma should be marked as tendered, inTransit, delivered, undeliverable, fully received, partially received, or fully received with a unexpected item. Partial receipt will result in random quantities received against all skus on the rma.  Defaults to 'receiveFull'.
                  randomize_inventory_statuses:
                    type: boolean
                    description: If completing receiving, send `true` in this field to simulate receiving into different inventory statuses. Will randomly place inventory into `available`, `quality-control`, `damaged`, `under-investigation`, or `refurbishing`.
            examples:
