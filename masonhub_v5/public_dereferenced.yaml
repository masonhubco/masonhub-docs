  /snapshotReady:
    post:
      tags:
        - Callback Events
      summary: Snapshot Ready
      description: |
        The snapshotReady callback is sent once a full snapshot request has been completed by MasonHub servers. It will contain a link to download the full snapshot, which you can then follow to retrieve the full JSON document of counts in the MasonHub OMS.
      requestBody:
        description: A single snapshot ready event
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  callback_url:
                    type: string
                    description: The url registered by the client for this type of callback event.
                  message_type:
                    type: string
                    description: The type of event that triggered this callback message.
                  message_id:
                    type: string
                    format: uuid
                    description: The MasonHub unique ID for this message
                  data:
                    type: object
                    properties:
                      snapshot_id:
                        type: string
                        format: uuid
                        description: The id of the snapshot in MasonHub's systems. Useful for debugging with MH engineers.
                      download_url:
                        type: string
                        description: The url to follow to retrieve the prepared snapshot.
                      snapshot_type:
                        type: string
                        description: The type of snapshot produced. Only a "full" snapshot is available at the current time.
                      requested_at:
                        type: string
                        format: date-time
                        description: Date and time of the original request.
              maxItems: 30
            examples:
              posted_sku_snapshot_callback:
                summary: CALLBACK - full snapshot is ready for download
                value:
                  callback_url: https://client.com/api/snapshot_ready
                  message_type: snapshotReady
                  message_id: 17f80741-d5bf-4e10-9658-d2e473ab664a
