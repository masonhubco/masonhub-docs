  /data_factory/resolveOrderCancel:
    post:
      tags:
        - DataFactory
      summary: Resolve Order Cancel
      description: |
        Force an order cancel into a resolved status of either sucess or failure.  Normally the distribution center is the point of authority on whether an order cancellation
        succeeds or fails.  For the sake of testing, however, you can use this endpoint and specifiy a pending order cancellation to resolve to either a success or
        failure so that your client integration receives the subsequent OrderCancelRequestCallback, and you can test that integration. In order for this endpoint to do anything,
        an existing cancellation request must have been made either through the portal or through the API.
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required:
                  - resolution
                properties:
                  order_customer_id:
                    type: string
                    description: |
                      Client's identifier for the order
                      - Only include if wanting to resolve every fulfillment's cancel request on an order
                      - **MUST INCLUDE** either order_customer_id or fulfillment_id
                  fulfillment_id:
                    type: string
                    description: |
                      Identifier for the fulfillment
                      - Include if wanting to resolve the cancellation of a specific fulfillment
                      - If both fulfillment_id and order_customer_ids are included in input, only the given fulfillment_id will have its cancel request resolved
                      - **MUST INCLUDE** either order_customer_id or fulfillment_id
                  resolution:
                    type: string
                    enum:
                      - success
                      - failure
                    description: Specify whether the cancel should suceed or not.  You will want to test both sucess and failures in order to ensure your client integration is handling both states correctly when the callback is posted to your endpoint.
            examples:
              posted_skus:
                summary: An example of a data factory request
                value:
                  - order_customer_id: '123456'
                    resolution: success
                  - fulfillment_id: '10005'
                    resolution: failure
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
