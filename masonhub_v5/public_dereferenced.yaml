  parameters:
    query_edt:
      in: query
      name: edt
      description: |
        Add an end date and time to search for events before. *If sdt/start date and time is left blank, query will return records before this date and time.*
        All date/time records should be submitted in RFC3339 format ("2018-10-21T14:00:21Z" or "2018-10-21T14:00:21-05:00").
      schema:
        type: string
        format: date-time
    query_sdt:
      in: query
      name: sdt
      description: |
        Start date and time that the system will query for. If no end date and time are provided, it will return the first 100 after the supplied start date and time.
        All date/time records should be submitted in RFC3339 format ("2018-10-21T14:00:21Z" or "2018-10-21T14:00:21-05:00").
      schema:
        type: string
        format: date-time
    query_sdt_order:
      in: query
      name: sdt
      description: |
        Start date and time that the system will query for. If no end date and time are provided, it will return the first 100 after the supplied start date and time.
        All date/time records should be submitted in RFC3339 format ("2018-10-21T14:00:21Z" or "2018-10-21T14:00:21-05:00"). This field queries orders for the updated at date.
      schema:
        type: string
        format: date-time
    query_sdt_asn:
      in: query
      name: sdt
      description: |
        Start date and time that the system will query for. If no end date and time are provided, it will return the first 100 after the supplied start date and time.
        All date/time records should be submitted in RFC3339 format ("2018-10-21T14:00:21Z" or "2018-10-21T14:00:21-05:00"). This field queries ASNs for the expected arrival dates.
      schema:
        type: string
        format: date-time
    query_sdt_rma:
      in: query
      name: sdt
      description: |
        Start date and time that the system will query for. If no end date and time are provided, it will return the first 100 after the supplied start date and time.
        All date/time records should be submitted in RFC3339 format ("2018-10-21T14:00:21Z" or "2018-10-21T14:00:21-05:00"). This field queries for the rma created dates.
      schema:
        type: string
        format: date-time
    query_offset:
      in: query
      name: offset
      description: |
        Add an offset to start the record set at. Returns the record inclusive of the offset number. `?offset=100` will return the 100th record and the records thereafter. If limit is not included, query will return the next 100 records.
      schema:
        type: integer
        format: int32
        default: 0
    query_limit:
      in: query
      name: limit
      description: Add a limit to the number of records to return. If no limit is provided, query will return the next 100 records.
      schema:
        type: integer
        default: 30
        minimum: 1
        maximum: 100
    path_uuid_required:
      in: path
      name: uuid
      description: The uuid of the record you're searching for.
      schema:
        type: string
        format: uuid
      required: true
    path_id_required:
      in: path
      name: id
      description: The customer_identifier of the record you're searching for.
      schema:
        type: string
      required: true
    query_id_list:
      in: query
      name: id
      description: |
        Include an array of MasonHub UUID's to find. For example:
          - `api/v1/[resource name]?id=baf403aa-c577-4425-b6d8-d34d1c6658cb,baf403aa-c577-4425-b6d8-d34d1c6658df`
          - `api/v1/[resource name]?id=baf403aa-c577-4425-b6d8-d34d1c6658cb&include_counts=true`
        Only use the ID field if you're searching via MasonHub's system ID. Use `cid` to search for items via your customer_identifier.
      schema:
        type: array
        items:
          type: string
          format: uuid
        minItems: 1
        maxItems: 30
      style: form
    query_cid_list:
      in: query
      name: cid
      description: |
        Include an array of customer_identifiers's to find. For example:
          - `api/v1/[resource name]?cid=132,421,pants2332`
          - `api/v1/[resource name]?cid=pants2332&include_counts=true`
        The customer_identifier values represent the values you use in your system to idenfify your records.
      schema:
        type: array
        items:
          type: string
        minItems: 1
        maxItems: 30
      style: form
    query_uuid_list:
      in: query
      name: uuid
      description: |
        Include an array of MasonHub UUID's to find. For example:
          - `api/v1/[resource name]?uuid=3878e51a-f0bd-4879-9b38-05e1959b1d30,3878e51a-f0bd-4879-9b38-05e1959b1d31`
          - `api/v1/[resource name]?uuid=3878e51a-f0bd-4879-9b38-05e1959b1d30&includ_counts=true`
      schema:
        type: array
        items:
          type: string
          format: uuid
        minItems: 1
        maxItems: 30
      style: form
    query_list_type:
      in: query
      name: list_type
      description: |
        Determines what type of list the API returns.
          - `Detail` will return the full representation of the resource with all included sub resources.
          - `Summary` will return a collapsed top-level summary of the resource without sub resources.
          -  *All other criteria apply.*
      schema:
        type: string
        enum:
          - detail
          - summary
        default: detail
    query_status:
      in: query
      name: status
      description: What item status would you like to retrieve. Defaults to `all`. Use `status` in the resource definition for directions.
      schema:
        type: string
        default: null
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: MasonHub requires that all gets, posts, deletes, and puts are done over https with a valid bearer token. Any non-coforming request will be rejected.
paths:
  /skus:
    get:
      tags:
        - Catalog
      summary: Get Skus on the Item Master
      description: |
        Skus are the only item we store against the client's catalog. Products, Brands, Vendors, etc are not first level constructs in our system for the simple
        reason that we only need to understand the details of the Sku to effectively receive and manage the storage and fulfillment of a sku's units. Skus can be deleted
        in our catalog, but that won't remove any inventory for that Sku. This is because when a physical unit is present, we still track it's inventory counts and history in perpetuity. 
        If units should be moved from a now dead/inactive sku to a new sku, that can be done through a relabeling request to the MasonHub operations team.
        Even if all units have been shipped, consumed, or relabeled, we will still maintain all previous history. So a sku never really leaves us, even if we'll never see it in our fulfillment center again.
      parameters:
        - in: query
          name: id
          description: |
            Include an array of MasonHub UUID's to find. For example:
              - `api/v1/[resource name]?id=baf403aa-c577-4425-b6d8-d34d1c6658cb,baf403aa-c577-4425-b6d8-d34d1c6658df`
              - `api/v1/[resource name]?id=baf403aa-c577-4425-b6d8-d34d1c6658cb&include_counts=true`
            Only use the ID field if you're searching via MasonHub's system ID. Use `cid` to search for items via your customer_identifier.
          schema:
            type: array
            items:
              type: string
              format: uuid
            minItems: 1
            maxItems: 30
          style: form
        - in: query
          name: cid
          description: |
            Include an array of customer_identifiers's to find. For example:
              - `api/v1/[resource name]?cid=132,421,pants2332`
              - `api/v1/[resource name]?cid=pants2332&include_counts=true`
            The customer_identifier values represent the values you use in your system to idenfify your records.
          schema:
            type: array
            items:
              type: string
            minItems: 1
            maxItems: 30
          style: form
        - in: query
          name: list_type
          description: |
            Determines what type of list the API returns.
              - `Detail` will return the full representation of the resource with all included sub resources.
              - `Summary` will return a collapsed top-level summary of the resource without sub resources.
              -  *All other criteria apply.*
          schema:
            type: string
            enum:
              - detail
              - summary
            default: detail
        - in: query
          name: limit
          description: Add a limit to the number of records to return. If no limit is provided, query will return the next 100 records.
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 100
        - in: query
          name: offset
          description: |
            Add an offset to start the record set at. Returns the record inclusive of the offset number. `?offset=100` will return the 100th record and the records thereafter. If limit is not included, query will return the next 100 records.
          schema:
            type: integer
            format: int32
            default: 0
        - in: query
          name: include_counts
          description: |
            Include the unit counts for the selected sku. Only applies to `detail` list type.
          schema:
            type: boolean
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
                      type: object
                      required:
                        - customer_identifier
                        - customer_bar_code
                        - brand_name
                        - product_name
                        - product_category
                        - product_sub_category
                        - product_description
                        - customer_brand_code
                        - vendor_brand_code
                        - dim_weight
                        - dim_length
                        - dim_width
                        - dim_height
                        - dim_volume
                      properties:
                        id:
                          type: string
                          format: uuid
                          readOnly: true
                          description: MasonHub's unique identifier for this record.
                        customer_identifier:
                          type: string
                          minimum: 2
                          maximum: 250
                          description: The customer's system identifier for this object. This must be unique to each record. MasonHub will pass this id back in all callbacks to customer endpoints.
                        customer_bar_code:
                          type: string
                          minimum: 5
                          maximum: 20
                          description: |
                            Customer provided bar code for this SKU. If no bar code is provided in either the customer or vendor bar code fields, MasonHub will assign one for tracking in the distribution center. Sku addition will fail if the submitted bar code already belongs to another sku in your account.
                        vendor_bar_code:
                          type: string
                          minimum: 5
                          maximum: 20
                          description: Vendor provided bar code for receiving. Should be UPC code if provided. Should be null if it hasn't been provided.
                        bar_codes:
                          type: array
                          minimum: 5
                          maximum: 20
                          description: Additional bar codes to include for this item. All provided bar codes must be unique to this item. Each must be between 5 and 20 chars.
                        vendor_style:
                          type: string
                          minimum: 1
                          maximum: 40
                          description: Vendor style code for item identification.
                        pick_style:
                          type: string
                          enum:
                            - FIFO
                            - FEFO
                            - LIFO
                          description: |
                            This is the method the WMS will use to determine how units should be picked.
                              - `FIFO` - First In First Out
                              - `FEFO` - First Expired First Out
                              - `LIFO` - Last In Last Out
                          default: FIFO
                        image_url:
                          type: string
                          description: |
                            The url for an image of the product. It's not required, but will be used by associates in the warehouse during receiving, picking, and packing operations.
                        brand_name:
                          type: string
                          minimum: 2
                          maximum: 100
                          description: Non-unique brand name for this sku and product.
                        product_name:
                          type: string
                          minimum: 2
                          maximum: 150
                          description: Non-unique product name for this sku.
                        product_category:
                          type: string
                          minimum: 1
                          maximum: 100
                          description: Non-unique product category for this sku.
                        product_sub_category:
                          type: string
                          minimum: 1
                          maximum: 100
                          description: Non-unique product category for this sku.
                        product_description:
                          type: string
                          minimum: 5
                          maximum: 250
                          description: Description of the product.
                        vendor_brand_code:
                          type: string
                          minimum: 1
                          maximum: 100
                          description: Non-unique vendor provided brand code for identifying this sku.
                        customer_brand_code:
                          type: string
                          minimum: 1
                          maximum: 100
                          description: Brand code provided by the customer. Used on packing lists.
                        customer_color:
                          type: string
                          minimum: 1
                          maximum: 100
                          description: Color used on distribution center labels and on packing lists.
                        vendor_color:
                          type: string
                          minimum: 1
                          maximum: 100
                          description: Vendor provided color used during receiving to identify products.
                        size:
                          type: string
                          minimum: 1
                          maximum: 20
                          description: Size of sku
                        vendor_size:
                          type: string
                          minimum: 1
                          maximum: 20
                          description: Vendor-specified size of sku
                        ormd:
                          type: boolean
                          default: false
                          description: Indicates to the warehouse that this sku contains a hazardous material that requires special handling during shipping.
                        lot_controlled:
                          type: boolean
                          default: false
                          description: Indicates to the distribution center that we should track and control the lot this sku was received into.
                        lot:
                          type: string
                          readOnly: true
                          minimum: 10
                          maximum: 100
                          description: The lot as indicated during receiving.
                        unit_cost:
                          type: number
                          format: double
                          description: Cost to the customer for this unit.
                        price:
                          type: number
                          format: double
                          description: Price to the customer for this unit. Used on packing slips.
                        is_kit:
                          type: boolean
                          description: This sku is the parent made up of multiple skus and should be either pre-built as a kit or can be built on demand, 'kit to ship'.
                          default: false
                        kit_skus:
                          type: array
                          description: For kit skus, this is the list of child skus that should make up that kit.
                          items:
                            type: object
                            required:
                              - quantity
                            properties:
                              sku_id:
                                type: string
                                format: uuid
                                description: MasonHub's unique identifier for this record.
                              customer_identifier:
                                type: string
                                minimum: 2
                                maximum: 100
                                description: Customer's sku_id.
                              quantity:
                                type: integer
                                format: int32
                                description: Number of units contained in the kit.
                        dim_weight:
                          type: number
                          format: double
                          description: Weight of the sku in ounces.
                        dim_length:
                          type: number
                          format: double
                          description: Length of the sku in inches.
                        dim_width:
                          type: number
                          format: double
