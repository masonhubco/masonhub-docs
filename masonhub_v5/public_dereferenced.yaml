                    download_url: https://app.masonhub.co/testaccount/api/v1/snapshot_download/1a2fdd63-8c3d-47a6-a18c-868e29b192b4.1560370293.json
                    snapshot_type: full
                    requested_at: '2019-06-12T16:11:33.680628-04:00'
