      summary: Order Shipment Event
      description: |
        Simulate a shipment's delivery lifecycle. All packages have a lifecycle of `manifested` -> `tendered` -> `inTransit` -> `delivered`/`undeliverable`.
        Use this endpoint to progress a shipment from one carrier status to another. Any adjustment to a shipment's status will automatically trigger
        an orderEvent. For example: If you want to simulate an order moving from `fulfilled` to `tendered`, mark all associated shipments as `tendered`.
        If you want to simulate a partial delivery, mark one of multiple shipments as `delivered`.
        MasonHub's OMS will automatically detect if an order has been partially delivered or fully delivered based on package statuses and send the correct callback.
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required:
                  - tracking_number
                  - event
                properties:
                  tracking_number:
                    type: string
                    description: The associated tracking number for the shipment you'd like to change statuses for.
                  event:
                    type: string
                    enum:
                      - tendered
                      - inTransit
                      - delivered
                      - undeliverable
                    description: Specify whether the associated shipment/package should be marked as tendered, inTransit, delivered, or undeliverable.
            examples:
