openapi: 3.0.0
info:
  description: |
    This is the MasonHub order management and distribution API.
    Use this to set up your item master, skus, receiving, send orders, check inventory levels and otherwise feel safe and secure that your inventory is in good hands.

    # API Design Philosophy
    ## Everything is Really Just Search
    All the GET methods operate on that principle that they are simply a search mechanism. We have decided to avoid the following url pattern in our api
    `https://app.masonhub.co/sampleAccount/api/v1/skus/123121` in favor of the more verbose `https://app.masonhub.co/sampleAccount/api/v1/skus?id=123121`. Then you can add parameters together
    and your program won't need to accomodate more than one end point. It also allows us to deliver a more composable, non-breaking interface. It makes trivial to add a
    new feature that returns more or less information, like so `https://app.masonhub.co/sampleAccount/api/v1/skus?id=123121&new_feature_flag=true`.

    ## Always an Array
    All the GET, PUT, POST, and DELETE methods accept or return an array of objects. This enables batch creation, updating and deleting without having to maintain or integrate with
    more than one endpoint. Additionally, you'll always know what you're getting. It'll be an array...an array of objects named after the resource.

    ## Summary vs Detail
    All GET endpoints have the ability to return a summary or detail by setting `list_type=detail` or `list_type=summary`. This allows you to check statuses from the same
    endpoint without getting a huge document with extreneous details. list_type defaults to **detail**.

    ## GET, POST, PUT, DELETE, No Patch
    We know. We want all the HTTP verbs. It's just not complete without it, but we prefer the simplicity of PUT over PATCH. You will always know to send us the whole record.
    We will maintain an accurate history of changes in our back-end. We could add Patch, but every change in a record on our systems results in a full journal of the record anyway.
    So put everything in the request body and there will be no mistake that we have the same record you do.

    ## Error Handling
    Because we allow multiple creations and updates at the same time, it's not enough to rely on HTTP response codes to determine if an operation was successful or not. On every POST, PUT, AND DELETE,
    we will return a 200 with a list of the requested resources back to you and a success or failure for each object. Every operation is non-blocking, so it is possible to send 30 orders to the POST#/orders end endpoint
    and succeed 29 out of 30 times. It's important for your systems to handle each object separately. This allows us to handle bulk and single operations seamlessly.

    ## Date Time Format
    All dates and times in the API satisfy RFC3339 standards, ex. 2019-08-19T08:15:30-07:00 or 2019-08-19T13:15:30Z

    # Security
    Your endpoints are secured using JWT in an encrypted Bearer token. This further contains a secret phrase which must match our internal records. Token's are never stored in our
    databases, but are decrypted and matched at runtime. So even if our database was compromised, no tokens would be lost to intruders. For all callbacks, we also recommend that you supply us with your own encrypted token so your systems can verify that it is indeed our system calling yours.
    You can supply a token for each callback and we'll ensure that all messages are encrypted and include the correct authorization information. We can send callbacks without a token, but we don't recommend it.
  version: '1.0'
  title: MasonHub Order Management System API
  x-logo:
    url: https://masonhub-portal-assets.s3.us-east-2.amazonaws.com/logos/mh-small.png
    altText: MasonHub Logo
  contact:
    name: API Support
    email: support@masonhub.co
tags:
  - name: DataFactory
    description: |
      Simulates actions in the OMS and triggers callback messages to the client callback url.
      DataFactory is designed so that clients can test their callback integrations in the Sandbox environment efficiently and independently,
      without needing to request these tests from the MasonHub team.

      The specified action endpoint will trigger corresponding events in the backend to mimick the action as it would have happened in real time.
      These actions can be used to populate data for testing and trigger callbacks in order to test callback handlers in your integration.
      Note that for an action to successfully post resultant callbacks, a callback url must be registered ahead of making a request to data_factory
  - name: Callbacks
    description: |
      Callbacks allow you to subscribe to real-time event information by registering urls from your domain to certain event types, such as inventory events and order events.
      These events are triggered by actions in our distribution centers, and so registering callbacks offers the ability for Masonhub to push event information in real time, rather than users needing to poll for that information asynchronously.
      Users are responsible for setting up the appropriate server and business logic behind the urls they are registering. Please see our user guide on registering and receiving callbacks.
  - name: Callback Events
    description: |
      These are the payloads that MasonHub API will send back to your client API, through registered callback endpoints.
      For more info on using Callbacks, please see our user guide on registering and receiving callbacks.
x-tagGroups:
  - name: Item Master
    tags:
      - Catalog
  - name: Inventory
    tags:
      - Inventory
  - name: Receiving
    tags:
      - Inbound Shipments / ASN
  - name: Order Management
    tags:
      - Orders
      - Shipments
      - Returns
      - Reservations
  - name: Account
    tags:
      - Account
      - Users
      - Callbacks
      - Callback Events
      - Callback Holds
  - name: Testing
    tags:
      - DataFactory
  - name: Security
    tags:
      - Tokens
servers:
  - url: https://app.masonhub.co/{urlSlug}/api/{basePath}
    description: The production API server
    variables:
      urlSlug:
        default: demoAccount
        description: The URL slug is assigned by your account representative.
      basePath:
        default: v1
  - url: https://sandbox.masonhub.co/{urlSlug}/api/{basePath}
    description: The sandbox API server
    variables:
      urlSlug:
        default: demoAccount
        description: The URL slug is assigned by your account representative.
      basePath:
        default: v1
security:
  - bearer_auth: []
components:
  schemas:
    sku:
      type: object
      required:
        - customer_identifier
        - customer_bar_code
        - brand_name
        - product_name
        - product_category
        - product_sub_category
        - product_description
        - customer_brand_code
        - vendor_brand_code
        - dim_weight
        - dim_length
        - dim_width
        - dim_height
        - dim_volume
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: MasonHub's unique identifier for this record.
        customer_identifier:
          type: string
          minimum: 2
          maximum: 250
          description: The customer's system identifier for this object. This must be unique to each record. MasonHub will pass this id back in all callbacks to customer endpoints.
        customer_bar_code:
          type: string
          minimum: 5
          maximum: 20
          description: |
            Customer provided bar code for this SKU. If no bar code is provided in either the customer or vendor bar code fields, MasonHub will assign one for tracking in the distribution center. Sku addition will fail if the submitted bar code already belongs to another sku in your account.
        vendor_bar_code:
          type: string
          minimum: 5
          maximum: 20
          description: Vendor provided bar code for receiving. Should be UPC code if provided. Should be null if it hasn't been provided.
        bar_codes:
          type: array
          minimum: 5
          maximum: 20
          description: Additional bar codes to include for this item. All provided bar codes must be unique to this item. Each must be between 5 and 20 chars.
        vendor_style:
          type: string
          minimum: 1
          maximum: 40
          description: Vendor style code for item identification.
        pick_style:
          type: string
          enum:
            - FIFO
            - FEFO
            - LIFO
          description: |
            This is the method the WMS will use to determine how units should be picked.
              - `FIFO` - First In First Out
              - `FEFO` - First Expired First Out
              - `LIFO` - Last In Last Out
          default: FIFO
        image_url:
          type: string
          description: |
            The url for an image of the product. It's not required, but will be used by associates in the warehouse during receiving, picking, and packing operations.
        brand_name:
          type: string
          minimum: 2
          maximum: 100
          description: Non-unique brand name for this sku and product.
        product_name:
          type: string
          minimum: 2
          maximum: 150
          description: Non-unique product name for this sku.
        product_category:
          type: string
          minimum: 1
          maximum: 100
          description: Non-unique product category for this sku.
        product_sub_category:
          type: string
          minimum: 1
          maximum: 100
          description: Non-unique product category for this sku.
        product_description:
          type: string
          minimum: 5
          maximum: 250
          description: Description of the product.
        vendor_brand_code:
          type: string
          minimum: 1
          maximum: 100
          description: Non-unique vendor provided brand code for identifying this sku.
        customer_brand_code:
          type: string
          minimum: 1
          maximum: 100
          description: Brand code provided by the customer. Used on packing lists.
        customer_color:
          type: string
          minimum: 1
          maximum: 100
          description: Color used on distribution center labels and on packing lists.
        vendor_color:
          type: string
          minimum: 1
          maximum: 100
          description: Vendor provided color used during receiving to identify products.
        size:
          type: string
          minimum: 1
          maximum: 20
          description: Size of sku
        vendor_size:
          type: string
          minimum: 1
          maximum: 20
          description: Vendor-specified size of sku
        ormd:
          type: boolean
          default: false
          description: Indicates to the warehouse that this sku contains a hazardous material that requires special handling during shipping.
        lot_controlled:
          type: boolean
          default: false
          description: Indicates to the distribution center that we should track and control the lot this sku was received into.
        lot:
          type: string
          readOnly: true
          minimum: 10
          maximum: 100
          description: The lot as indicated during receiving.
        unit_cost:
          type: number
          format: double
          description: Cost to the customer for this unit.
        price:
          type: number
          format: double
          description: Price to the customer for this unit. Used on packing slips.
        is_kit:
          type: boolean
          description: This sku is the parent made up of multiple skus and should be either pre-built as a kit or can be built on demand, 'kit to ship'.
          default: false
        kit_skus:
          type: array
          description: For kit skus, this is the list of child skus that should make up that kit.
          items:
            type: object
            required:
              - quantity
            properties:
              sku_id:
                type: string
                format: uuid
                description: MasonHub's unique identifier for this record.
              customer_identifier:
                type: string
                minimum: 2
                maximum: 100
                description: Customer's sku_id.
              quantity:
                type: integer
                format: int32
                description: Number of units contained in the kit.
        dim_weight:
          type: number
          format: double
          description: Weight of the sku in ounces.
        dim_length:
          type: number
          format: double
          description: Length of the sku in inches.
        dim_width:
          type: number
          format: double
          description: Width of the sku in inches.
        dim_height:
          type: number
          format: double
          description: Height of the sku in inches.
        dim_volume:
          type: number
          format: double
          description: Volume of the sku in cubic inches.
        country_of_origin:
          type: string
          maximum: 4
          description: Country from which item originated.
        commodity_code:
          type: string
          maximum: 10
          description: International HS or HTS commodity code for the item.
        special_shipping_instructions:
          type: string
          description: Special shipping instructions for this sku.
        inventory_counts:
          type: object
          required:
            - sku_id
            - customer_identifier
            - total_units
            - total_available_to_sell
            - counts_by_status
            - as_of
          properties:
            sku_id:
              type: string
              format: uuid
            customer_identifier:
              type: string
              description: customer's identifier for this inventory record
            total_units:
              type: integer
              description: Total number of units at warehouse.
            total_available_to_sell:
              type: integer
              description: Total number of units ready to be picked in the MasonHub network.
            counts_by_status:
              type: array
              items:
                type: object
                required:
                  - inventory_status
                  - count
                  - as_of
                properties:
                  inventory_status:
                    type: string
                    enum:
                      - shipped
                      - available
                      - allocated
                      - received
                      - lost
                      - backordered
                      - damaged
                      - quality-control
                      - expected
                      - kit-to-ship-available
                      - oversellable
                      - under-investigation
                      - refurbishing
                      - destroyed
                      - relabeled
                      - consumed
                    description: |
                      Inventory Status:
                        * `expected` - Inventory that is expected to arrive at one of MasonHub's distribution centers. Units are counted as expected when they are on open or onDock  inbound shipments / ASN's or customer returns.
                        * `available` - Inventory is available and ready to pick at the distribution center. Units are considered available when they are in a pickable location in one of our distribution centers.
                        * `damaged` - Inventory has been moved into a damaged state. Units are considered damaged when an associate discovers a flaw either during receipt (often during the receipt of an RMA) or other normal warehouse operations. Damaged units are held for review by the client.
                        * `lost` - Inventory has been lost at the distribution center. Units are lost when we can no longer match up our available count to what we have in the distribution center. Lost units decrement available inventory.
                        * `backordered` - Inventory that has been backordered and that will be fulfilled as soon as units have been received at the facility.
                        * `received` - Inventory that has not yet been putaway for picking. Received is a transient status for units that are on their way to a pickable location. It is rare for any units to be reported as a `received` but we do record the movement in our ledger.
                        * `allocated` - Inventory has been allocated to an order. Allocated units have not yet been picked and placed in an order, and they are also not sellable. The allocated inventory status correlates with open orders.
                        * `quality-control`- Inventory that is under review by our inventory control team. Quality Control units are often received in a customer return and require extra scrutiny before being made available.
                        * `kit-to-ship-available` - Inventory that is made available based on the child skus assigned during sku creation or update. Kit To Ship available is dynamically recalculated as individual child units are received or shipped.
                        * `oversellable` - Inventory that has been made available via an oversell policy. Units in an oversellable state can be placed on backorder. 
                        * `under-investigation` - Inventory that has been allocated to an order but needs inventory control review before being shipped.
                        * `refurbishing` - Inventory that has been received but is getting refurbished as per the clients instructions (e.g. units that are being dry cleaned).
                        * `destroyed` - Inventory that has been destroyed as per the clients instructions.
                        * `relabeled` - Inventory that was incorrectly labeled as one sku and must be assigned to the correct sku. There will be a corresponding increment to available inventory in the correct sku.
                        * `consumed` - Inventory that has been consumed during normal business operations (e.g. packaging tape, tissue paper, boxes).
                        * `shipped` - Inventory that has been placed on an order and shipped. Shipped units have left one of MasonHub's distribution centers and are no longer in our posession.
                    readOnly: true
                  count:
                    type: number
                    description: Number of units in this status.
                    readOnly: true
                  as_of:
                    type: string
                    format: date-time
                    readOnly: true
                    description: Date and time this count was produced.
            inventory_counts_by_status_and_distribution_center:
              type: array
              items:
                type: object
                required:
                  - distribution_center
                  - counts_by_status
                properties:
                  distribution_center:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                        description: MasonHub's identifier for this distribution center.
                      name:
                        type: string
                        description: MasonHub's name of the distribution center.
                      street_line_one:
                        type: string
                        minimum: 5
                        maximum: 100
                        description: Street Address Line 1.
                      street_line_two:
                        type: string
                        minimum: 5
                        maximum: 100
                        description: Street Address Line 2.
                      city:
                        type: string
                        minimum: 2
                        maximum: 100
                        description: Address City.
                      locale:
                        type: string
                        minimum: 2
                        maximum: 100
                        description: State/Province/Locale for this address.
                      postal_code:
                        type: string
                        minimum: 5
                        maximum: 10
                        description: Postal/Zip code for this address.
                  counts_by_status:
                    type: array
                    items:
                      type: object
                      required:
                        - inventory_status
                        - count
                        - as_of
                      properties:
                        inventory_status:
                          type: string
                          enum:
                            - shipped
                            - available
                            - allocated
                            - received
                            - lost
                            - backordered
                            - damaged
                            - quality-control
                            - expected
                            - kit-to-ship-available
                            - oversellable
                            - under-investigation
                            - refurbishing
                            - destroyed
                            - relabeled
                            - consumed
                          description: |
                            Inventory Status:
                              * `expected` - Inventory that is expected to arrive at one of MasonHub's distribution centers. Units are counted as expected when they are on open or onDock  inbound shipments / ASN's or customer returns.
                              * `available` - Inventory is available and ready to pick at the distribution center. Units are considered available when they are in a pickable location in one of our distribution centers.
                              * `damaged` - Inventory has been moved into a damaged state. Units are considered damaged when an associate discovers a flaw either during receipt (often during the receipt of an RMA) or other normal warehouse operations. Damaged units are held for review by the client.
                              * `lost` - Inventory has been lost at the distribution center. Units are lost when we can no longer match up our available count to what we have in the distribution center. Lost units decrement available inventory.
                              * `backordered` - Inventory that has been backordered and that will be fulfilled as soon as units have been received at the facility.
                              * `received` - Inventory that has not yet been putaway for picking. Received is a transient status for units that are on their way to a pickable location. It is rare for any units to be reported as a `received` but we do record the movement in our ledger.
                              * `allocated` - Inventory has been allocated to an order. Allocated units have not yet been picked and placed in an order, and they are also not sellable. The allocated inventory status correlates with open orders.
                              * `quality-control`- Inventory that is under review by our inventory control team. Quality Control units are often received in a customer return and require extra scrutiny before being made available.
                              * `kit-to-ship-available` - Inventory that is made available based on the child skus assigned during sku creation or update. Kit To Ship available is dynamically recalculated as individual child units are received or shipped.
                              * `oversellable` - Inventory that has been made available via an oversell policy. Units in an oversellable state can be placed on backorder. 
                              * `under-investigation` - Inventory that has been allocated to an order but needs inventory control review before being shipped.
                              * `refurbishing` - Inventory that has been received but is getting refurbished as per the clients instructions (e.g. units that are being dry cleaned).
                              * `destroyed` - Inventory that has been destroyed as per the clients instructions.
                              * `relabeled` - Inventory that was incorrectly labeled as one sku and must be assigned to the correct sku. There will be a corresponding increment to available inventory in the correct sku.
                              * `consumed` - Inventory that has been consumed during normal business operations (e.g. packaging tape, tissue paper, boxes).
                              * `shipped` - Inventory that has been placed on an order and shipped. Shipped units have left one of MasonHub's distribution centers and are no longer in our posession.
                          readOnly: true
                        count:
                          type: number
                          description: Number of units in this status.
                          readOnly: true
                        as_of:
                          type: string
                          format: date-time
                          readOnly: true
                          description: Date and time this count was produced.
            as_of:
              type: string
              format: date-time
              description: Date and time this count was produced.
        value_added_service_code:
          type: string
          description: VAS code for this sku. Must be agreed to with your account representative.
        conveyable:
          type: boolean
          readOnly: true
          description: Is this a conveyable sku? Set at the warehouse based on dimension and weight.
        expiration_date:
          type: string
          format: date-time
          description: The expiration date of this sku.
        created_at:
          type: string
          readOnly: true
          description: Date and Time this record was created on MasonHub's servers.
        updated_at:
          type: string
          readOnly: true
          description: Date and Time of last update on MasonHub's servers.
        deleted_at:
          type: string
          readOnly: true
          description: Date amd Time this record was deleted from MasonHub's servers.
    sku_put:
      type: object
      required:
        - customer_identifier
        - customer_bar_code
        - brand_name
        - product_name
        - product_category
        - product_sub_category
        - product_description
