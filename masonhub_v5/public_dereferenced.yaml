      properties:
        sku_id:
          type: string
          format: uuid
        customer_identifier:
          type: string
          description: customer's identifier for this inventory record
        total_units:
          type: integer
          description: Total number of units at warehouse.
        total_available_to_sell:
          type: integer
          description: Total number of units ready to be picked in the MasonHub network.
        counts_by_status:
          type: array
          items:
            type: object
            required:
              - inventory_status
              - count
              - as_of
            properties:
              inventory_status:
                type: string
                enum:
                  - shipped
                  - available
                  - allocated
                  - received
                  - lost
                  - backordered
                  - damaged
                  - quality-control
                  - expected
                  - kit-to-ship-available
                  - oversellable
                  - under-investigation
                  - refurbishing
                  - destroyed
                  - relabeled
                  - consumed
                description: |
                  Inventory Status:
                    * `expected` - Inventory that is expected to arrive at one of MasonHub's distribution centers. Units are counted as expected when they are on open or onDock  inbound shipments / ASN's or customer returns.
                    * `available` - Inventory is available and ready to pick at the distribution center. Units are considered available when they are in a pickable location in one of our distribution centers.
                    * `damaged` - Inventory has been moved into a damaged state. Units are considered damaged when an associate discovers a flaw either during receipt (often during the receipt of an RMA) or other normal warehouse operations. Damaged units are held for review by the client.
                    * `lost` - Inventory has been lost at the distribution center. Units are lost when we can no longer match up our available count to what we have in the distribution center. Lost units decrement available inventory.
                    * `backordered` - Inventory that has been backordered and that will be fulfilled as soon as units have been received at the facility.
                    * `received` - Inventory that has not yet been putaway for picking. Received is a transient status for units that are on their way to a pickable location. It is rare for any units to be reported as a `received` but we do record the movement in our ledger.
                    * `allocated` - Inventory has been allocated to an order. Allocated units have not yet been picked and placed in an order, and they are also not sellable. The allocated inventory status correlates with open orders.
                    * `quality-control`- Inventory that is under review by our inventory control team. Quality Control units are often received in a customer return and require extra scrutiny before being made available.
                    * `kit-to-ship-available` - Inventory that is made available based on the child skus assigned during sku creation or update. Kit To Ship available is dynamically recalculated as individual child units are received or shipped.
                    * `oversellable` - Inventory that has been made available via an oversell policy. Units in an oversellable state can be placed on backorder. 
                    * `under-investigation` - Inventory that has been allocated to an order but needs inventory control review before being shipped.
                    * `refurbishing` - Inventory that has been received but is getting refurbished as per the clients instructions (e.g. units that are being dry cleaned).
                    * `destroyed` - Inventory that has been destroyed as per the clients instructions.
                    * `relabeled` - Inventory that was incorrectly labeled as one sku and must be assigned to the correct sku. There will be a corresponding increment to available inventory in the correct sku.
                    * `consumed` - Inventory that has been consumed during normal business operations (e.g. packaging tape, tissue paper, boxes).
                    * `shipped` - Inventory that has been placed on an order and shipped. Shipped units have left one of MasonHub's distribution centers and are no longer in our posession.
                readOnly: true
              count:
                type: number
                description: Number of units in this status.
                readOnly: true
              as_of:
                type: string
                format: date-time
                readOnly: true
                description: Date and time this count was produced.
        inventory_counts_by_status_and_distribution_center:
          type: array
          items:
            type: object
            required:
              - distribution_center
