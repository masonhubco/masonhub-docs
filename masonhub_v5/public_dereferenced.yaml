  /order_cancel_requests:
    post:
      tags:
        - Orders
      summary: Cancel Orders
      description: |
        Cancel one or more orders on MasonHub's servers. The body of requests only needs to identify the order requested for cancellation, either by the customer identifier, or the MashonHub UUID.
        Take note that a POST to this endpoint is a **request** to cancel the order, and not a synchronous cancel.
        A line item status of "success" in the response to this POST represents that the request was accepted, and not that the cancellation will succeed in propagating.
        Any cancellations after initial creation may or may not succeed, depending on the state of order in the distribution center.
        Success or failure of the update will be provided via the OrderCancelResponse callback.

        POST /order_cancel_requests will fail to update for the following reasons:
          - An order has already shipped.
          - An order has already been packed.
      requestBody:
        description: POST one or more order cancels.
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  order_cancel_request_id:
                    type: string
                    format: uuid
                    description: MasonHub's unique identifier for this order cancel request.
                  customer_identifier:
                    type: string
                    minimum: 5
                    maximum: 250
                    description: The customer's identifier for the order to be cancelled.
              maxItems: 30
            examples:
              one:
                summary: List of Customer Orders
                value:
                  - customer_identifier: '129374'
                  - order_cancel_request_id: 654b2cdf-34b8-4b0f-b787-695b3491a58e
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                type: object
                required:
                  - customer_identifier
                  - status
                  - messages
                properties:
                  records_submitted:
                    type: integer
                    description: Number of records submitted in the request.
                  records_processed:
                    type: integer
                    description: Number of records actually processed.
                  records_failed:
                    type: integer
                    description: Number of records rejected by the server for validation reasons.
                  records_succeeded:
                    type: integer
                    description: Number of records that passed validation and queued up for action on the MasonHub server.
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        customer_identifier:
                          type: string
                          minimum: 1
                          maximum: 100
                          description: Customer identifier for the record.
                        status:
                          type: string
                          enum:
                            - success
                            - failure
                          description: The result of the requested action.
                        url:
                          type: string
                          description: url of the created or edited record.
                        messages:
                          type: array
                          items:
                            type: object
                            properties:
                              field_name:
                                type: string
                                description: name of field with error messages
                              errors:
                                type: array
                                items:
                                  type: string
                summary: Response for posted Skus
                value:
                  records_submitted: 2
                  records_processed: 2
                  records_failed: 1
                  records_succeeded: 1
                  results:
                    - customer_identifier: shirts34563
                      status: Success
                      url: https://app.masonhub.co/demo_account/api/v1/skus?id=shirts34563
                    - customer_identifier: shirts450293
                      status: Failure
                      messages:
                        - customer_identifier:
                            - '301: ''shirts450293'' is already taken and ''customer_identifier'' must be unique'
              examples:
                one:
                  summary: Response for posted order cancel requests
                  value:
                    records_submitted: 1
